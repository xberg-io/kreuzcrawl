[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
  "RUSTSEC-2024-0436", # paste crate unmaintained - transitive dep from biblatex/tokenizers
  "RUSTSEC-2025-0141", # bincode 1.3.3 unmaintained - build-dep of deno_core 0.400 (crawlberg-browser)
  "RUSTSEC-2026-0176", # pyo3 0.28 PyCFunction::new_closure missing Sync bound - crawlberg-py does not use new_closure; pyo3 0.29 upgrade blocked on pyo3-async-runtimes 0.28 (no 0.29 release yet)
  "RUSTSEC-2026-0177", # pyo3 0.28 PyCFunction::new_closure missing Sync bound - crawlberg-py does not use new_closure; pyo3 0.29 upgrade blocked on pyo3-async-runtimes 0.28 (no 0.29 release yet)
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unlicense",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "bzip2-1.0.6",
  "BSL-1.0",
  "OpenSSL",
  "NCSA",
]
confidence-threshold = 0.8

# Per-crate exceptions for copyleft licenses.
# These are pinned to specific crates — nothing else can use these licenses.
exceptions = [
  # cbindgen: build-time C header generator, not linked into binaries
  { allow = ["MPL-2.0"], crate = "cbindgen" },
  # option-ext: tiny utility (transitive dep of cbindgen)
  { allow = ["MPL-2.0"], crate = "option-ext" },
  # r-efi: UEFI bindings, platform-specific transitive dep, never linked
  { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
  # crawlberg-browser DOM/CSS deps (Servo) — vendored from Apache-2.0 Obscura
  # into a `publish = false` crate; mainstream Servo libs widely used in Rust.
  { allow = ["MPL-2.0"], crate = "cssparser" },
  { allow = ["MPL-2.0"], crate = "cssparser-macros" },
  { allow = ["MPL-2.0"], crate = "dtoa-short" },
  { allow = ["MPL-2.0"], crate = "selectors" },
  # cooked-waker: deno_core build-time dep, never linked into the final binary
  { allow = ["MPL-2.0"], crate = "cooked-waker" },
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
