[build-system]
build-backend = "maturin"
requires = [ "maturin>=1,<2" ]

[project]
name = "kreuzcrawl"
version = "0.1.0-rc.1"
description = "High-performance web crawling engine"
keywords = [ "crawl", "scrape", "spider", "web" ]
license = "Elastic-2.0"
authors = [
  { name = "Kreuzberg Team" },
]
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
urls.repository = "https://github.com/kreuzberg-dev/kreuzcrawl"

[tool.maturin]
module-name = "kreuzcrawl._kreuzcrawl"
manifest-path = "../../crates/kreuzcrawl-py/Cargo.toml"
features = [ "pyo3/extension-module" ]
python-packages = [ "kreuzcrawl" ]
