[package]
name = "kreuzcrawl-rb"
version = "0.1.0-rc.1"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzcrawl = { path = "../../../../crates/kreuzcrawl" }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_magnus = "0.11"
tokio = { version = "1", features = ["full"] }
