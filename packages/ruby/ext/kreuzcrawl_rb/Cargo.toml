[package]
name = "kreuzcrawl-rb"
version = "0.3.0-rc.18"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzcrawl = { path = "../../../../crates/kreuzcrawl" }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
