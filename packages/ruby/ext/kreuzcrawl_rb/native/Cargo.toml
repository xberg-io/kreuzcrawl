[package]
name = "kreuzcrawl-rb"
version = "0.3.0-rc.37"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "spider", "web"]
categories = ["text-processing"]

[lib]
name = "kreuzcrawl_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
futures = "0.3"
kreuzcrawl = { version = "0.3.0-rc.37", path = "../../../../../crates/kreuzcrawl", features = ["interact", "browser-chromiumoxide"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
[package.metadata.cargo-machete]
ignored = ["tokio", "futures"]
