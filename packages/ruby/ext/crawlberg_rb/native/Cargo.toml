[package]
name = "crawlberg-rb"
version = "0.3.0"
edition = "2024"
license = "MIT"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "spider", "web"]
categories = []

[package.metadata.cargo-machete]
ignored = ["rb-sys"]

[lib]
name = "crawlberg_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
crawlberg = { version = "0.3.0", path = "../../../../../crates/crawlberg", features = ["interact", "browser-chromiumoxide"] }
futures = "0.3"
magnus = "0.8"
rb-sys = ">=0.9, <0.9.128"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
