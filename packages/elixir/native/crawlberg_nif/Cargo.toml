[package]
name = "crawlberg_nif"
version = "0.3.0"
edition = "2024"
license = "MIT"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "spider", "web"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "futures-util", "alloc-no-stdlib", "alloc-stdlib", "brotli-decompressor"]

[workspace]

[lib]
name = "crawlberg_nif"

crate-type = ["cdylib"]

[features]
default = []

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
brotli-decompressor = "=5.0.1"
crawlberg = { version = "0.3.0", path = "../../../../crates/crawlberg", features = ["interact", "browser-chromiumoxide"] }
futures-util = "0.3"
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values())'] }
