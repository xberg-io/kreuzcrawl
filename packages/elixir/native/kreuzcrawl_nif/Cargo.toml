[package]
name = "kreuzcrawl_nif"
version = "0.3.0-rc.23"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "web", "spider"]
categories = ["text-processing"]

[workspace]

[lib]
name = "kreuzcrawl_nif"

crate-type = ["cdylib"]

[dependencies]
futures-util = "0.3"
kreuzcrawl = { path = "../../../../crates/kreuzcrawl", features = [
  "interact",
  "browser-chromiumoxide",
] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
