[package]
name = "kreuzcrawl_rustler"
version = "0.1.0-rc.9"
edition = "2024"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
readme = "README.md"
keywords = ["crawl", "scrape", "web", "spider"]
categories = ["text-processing"]

[lib]
crate-type = ["cdylib"]
path = "../kreuzcrawl_nif/src/lib.rs"

[dependencies]
kreuzcrawl = { path = "../../../../crates/kreuzcrawl" }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
