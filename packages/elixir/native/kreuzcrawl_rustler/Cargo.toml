[package]
name = "kreuzcrawl_rustler"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzcrawl = { path = "../../../../crates/kreuzcrawl" }
rustler = "0.36"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
