name: CI Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - "zensical.toml"
      - ".typos.toml"
      - ".lychee.toml"
      - ".textlintrc.json"
      - ".github/workflows/ci-docs.yaml"
      - "scripts/ci/docs/**"
      - "alef.toml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - "zensical.toml"
      - ".typos.toml"
      - ".lychee.toml"
      - ".textlintrc.json"
      - ".github/workflows/ci-docs.yaml"
      - "scripts/ci/docs/**"
      - "alef.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NOTE: build-docs@v1 currently installs only `--group dev` via its embedded
      # setup-python-env step, which omits zensical (lives in `--group docs`).
      # Until the shared action accepts an install-command override, we set up the
      # docs environment inline and invoke zensical directly.
      - name: Setup Python
        uses: kreuzberg-dev/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: docs-build
          install-command: "uv sync --group docs --no-install-project --no-install-workspace --frozen"

      - name: Build docs (strict)
        run: scripts/ci/docs/build.sh --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site/
          retention-days: 1

  lint:
    name: Lint
    if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Lint documentation (links + prose + snippets)
        uses: kreuzberg-dev/actions/lint-docs@v1
        with:
          strict: "false"
          validate-snippets: "true"
          alef-ref: "main"

  deploy:
    name: Deploy
    needs: [build, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
