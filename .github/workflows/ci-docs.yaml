name: CI Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - "zensical.toml"
      - ".typos.toml"
      - ".lychee.toml"
      - ".textlintrc.json"
      - ".github/workflows/ci-docs.yaml"
      - "scripts/ci/docs/**"
      - "alef.toml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "pyproject.toml"
      - "zensical.toml"
      - ".typos.toml"
      - ".lychee.toml"
      - ".textlintrc.json"
      - ".github/workflows/ci-docs.yaml"
      - "scripts/ci/docs/**"
      - "alef.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build documentation
        uses: kreuzberg-dev/actions/build-docs@v1
        with:
          strict: "true"
          python-version: "3.13"

      - name: Upload site artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docs-site
          path: site/
          retention-days: 1

  lint:
    name: Lint
    if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Lint documentation (links + prose + snippets)
        uses: kreuzberg-dev/actions/lint-docs@v1
        with:
          strict: "false"
          validate-snippets: "true"
          alef-ref: "main"

  deploy:
    name: Deploy
    needs: [build, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: docs-site
          path: site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
