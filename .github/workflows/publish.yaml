    csharp-natives-musl:
        name: Build C# natives (linux-musl-${{ matrix.arch }})
        needs: [prepare, check-nuget]
        if: ${{ needs.prepare.outputs.release_csharp == 'true' && (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: ubuntu-latest, arch: x64, target: x86_64-unknown-linux-musl, rid: linux-musl-x64 }
                    - { os: ubuntu-24.04-arm, arch: arm64, target: aarch64-unknown-linux-musl, rid: linux-musl-arm64 }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive

            - uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-csharp-${{ matrix.rid }}

            - uses: kreuzberg-dev/actions/build-csharp-natives@v1
              with:
                  target: ${{ matrix.target }}
                  crate-name: kreuzcrawl-ffi
                  lib-name: kreuzcrawl_ffi
                  rid: ${{ matrix.rid }}

            - uses: actions/upload-artifact@v7
              with:
                  name: csharp-natives-${{ matrix.rid }}
                  path: dist/csharp-natives
                  if-no-files-found: error
                  retention-days: 14

    elixir-natives:
        name: Build Elixir NIF (${{ matrix.label }} nif-${{ matrix.nif }})
        needs: [prepare, check-elixir-release, publish-crates]
        if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' && (needs.check-elixir-release.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: ubuntu-latest, label: linux-x86_64, target: x86_64-unknown-linux-gnu, nif: "2.16" }
                    - { os: ubuntu-latest, label: linux-x86_64, target: x86_64-unknown-linux-gnu, nif: "2.17" }
                    - { os: ubuntu-24.04-arm, label: linux-aarch64, target: aarch64-unknown-linux-gnu, nif: "2.16" }
                    - { os: ubuntu-24.04-arm, label: linux-aarch64, target: aarch64-unknown-linux-gnu, nif: "2.17" }
                    - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.16" }
                    - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin, nif: "2.17" }
                    - { os: macos-15-intel, label: macos-x86_64, target: x86_64-apple-darwin, nif: "2.16" }
                    - { os: macos-15-intel, label: macos-x86_64, target: x86_64-apple-darwin, nif: "2.17" }
                    - { os: windows-latest, label: windows-x86_64, target: x86_64-pc-windows-msvc, nif: "2.16" }
                    - { os: windows-latest, label: windows-x86_64, target: x86_64-pc-windows-msvc, nif: "2.17" }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive

            - name: Free disk space
              if: runner.os == 'Linux'
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - name: Override ImageOS on ARM Linux runners
              # erlef/setup-beam@v1 maps ImageOS env to its package index. On
              # `ubuntu-24.04-arm` the runner reports `ImageOS=ubuntu24-arm64`,
              # which setup-beam does not recognize. Force it to `ubuntu24` —
              # the OTP packages are arch-aware via setup-beam's separate logic.
              if: matrix.os == 'ubuntu-24.04-arm'
              shell: bash
              run: echo "ImageOS=ubuntu24" >> "$GITHUB_ENV"

            - name: Override ImageOS on Windows runners
              # `windows-latest` now reports `ImageOS=win25-vs2026` which
              # erlef/setup-beam@v1 does not yet recognise (supported set:
              # win19, win22, win25). Force it to `win25` so the OTP/Elixir
              # package index lookup succeeds.
              if: runner.os == 'Windows'
              shell: bash
              run: echo "ImageOS=win25" >> "$GITHUB_ENV"

            - uses: erlef/setup-beam@v1
              with:
                  elixir-version: "1.17"
                  otp-version: "27"

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-elixir-${{ matrix.label }}

            - uses: kreuzberg-dev/actions/build-elixir-natives@v1
              with:
                  target: ${{ matrix.target }}
                  nif-crate-name: kreuzcrawl_nif
                  nif-crate-path: packages/elixir/native/kreuzcrawl_nif
                  package-dir: packages/elixir
                  nif-version: ${{ needs.prepare.outputs.version }}
                  nif-api-version: ${{ matrix.nif }}

            - uses: actions/upload-artifact@v7
              with:
                  name: elixir-${{ matrix.label }}-nif-${{ matrix.nif }}
                  path: dist/elixir-natives/*.tar.gz
                  if-no-files-found: error
                  retention-days: 14

    elixir-natives-musl:
        name: Build Elixir NIF (linux-musl-${{ matrix.arch }} nif-${{ matrix.nif }})
        needs: [prepare, check-elixir-release, publish-crates]
        if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' && (needs.check-elixir-release.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: ubuntu-latest, arch: x86_64, target: x86_64-unknown-linux-musl, nif: "2.16" }
                    - { os: ubuntu-latest, arch: x86_64, target: x86_64-unknown-linux-musl, nif: "2.17" }
                    - { os: ubuntu-24.04-arm, arch: aarch64, target: aarch64-unknown-linux-musl, nif: "2.16" }
                    - { os: ubuntu-24.04-arm, arch: aarch64, target: aarch64-unknown-linux-musl, nif: "2.17" }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive

            - uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - name: Override ImageOS on ARM Linux runners
              if: matrix.os == 'ubuntu-24.04-arm'
              shell: bash
              run: echo "ImageOS=ubuntu24" >> "$GITHUB_ENV"

            - uses: erlef/setup-beam@v1
              with:
                  elixir-version: "1.17"
                  otp-version: "27"

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-elixir-musl-${{ matrix.arch }}

            - uses: kreuzberg-dev/actions/build-elixir-natives@v1
              with:
                  target: ${{ matrix.target }}
                  nif-crate-name: kreuzcrawl_nif
                  nif-crate-path: packages/elixir/native/kreuzcrawl_nif
                  package-dir: packages/elixir
                  nif-version: ${{ needs.prepare.outputs.version }}
                  nif-api-version: ${{ matrix.nif }}

            - uses: actions/upload-artifact@v7
              with:
                  name: elixir-musl-${{ matrix.arch }}-nif-${{ matrix.nif }}
                  path: dist/elixir-natives/*.tar.gz
                  if-no-files-found: error
                  retention-days: 14

    swift-artifactbundle:
        name: Build Swift artifact bundle
        needs: prepare
        if: ${{ needs.prepare.outputs.release_swift == 'true' }}
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
            - uses: kreuzberg-dev/actions/setup-rust@v1
            - uses: kreuzberg-dev/actions/build-swift-artifactbundle@v1
              id: bundle
              with:
                  crate-name: kreuzcrawl-swift
                  artifact-name: Kreuzcrawl-rs
                  package-manifest-path: Package.swift
                  package-version: ${{ needs.prepare.outputs.version }}
            - uses: actions/upload-artifact@v7
              with:
                  name: swift-artifactbundle
                  path: ${{ steps.bundle.outputs.bundle-zip }}
                  if-no-files-found: error
                  retention-days: 14

    swift-package:
        name: Build Swift package
        needs: prepare
        if: ${{ needs.prepare.outputs.release_swift == 'true' }}
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - uses: kreuzberg-dev/actions/setup-rust@v1

            - uses: kreuzberg-dev/actions/build-swift-package@v1
              with:
                  package-dir: packages/swift
                  crate-name: kreuzcrawl-swift

            - uses: actions/upload-artifact@v7
              with:
                  name: swift-package
                  path: packages/swift
                  retention-days: 14

    zig-package:
        name: Build Zig package (smoke check)
        needs: prepare
        if: ${{ needs.prepare.outputs.release_zig == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0

            - uses: kreuzberg-dev/actions/setup-rust@v1

            - uses: kreuzberg-dev/actions/build-zig-package@v1
              with:
                  ffi-crate: kreuzcrawl-ffi
                  package-dir: packages/zig

    # ─── GitHub Release asset uploads ─────────────────────────────────────

    upload-cli-release:
        name: Upload CLI binaries to GitHub Release
        needs: [prepare, cli-binaries, cli-musl-binaries]
        if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.cli-binaries.result == 'success' || needs.cli-musl-binaries.result == 'success') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  pattern: cli-*
                  path: dist/cli
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/cli
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: |
                      kreuzcrawl-cli-*.tar.gz
                      kreuzcrawl-cli-*.zip
                  token: ${{ steps.app-token.outputs.token }}

    upload-go-release:
        name: Upload Go FFI archives to GitHub Release
        needs: [prepare, go-ffi-libraries]
        if: ${{ needs.prepare.outputs.release_go == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.go-ffi-libraries.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  pattern: go-ffi-*
                  path: dist/go-ffi
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/go-ffi
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: kreuzcrawl-go-*.tar.gz
                  token: ${{ steps.app-token.outputs.token }}

    push-go-subdir-tag:
        name: Push Go module subdir tag
        needs: [prepare, upload-go-release]
        if: ${{ needs.prepare.outputs.release_go == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.upload-go-release.result == 'success' || needs.upload-go-release.result == 'skipped') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.prepare.outputs.target_sha }}
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - name: Push Go subdir tag
              shell: bash
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  TAG_NAME="packages/go/v${{ needs.prepare.outputs.version }}"
                  git tag -a "$TAG_NAME" -m "Go module release ${{ needs.prepare.outputs.version }}"
                  git push origin "$TAG_NAME"

    upload-c-ffi-release:
        name: Upload C FFI archives to GitHub Release
        needs: [prepare, c-ffi-libraries]
        if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.c-ffi-libraries.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  pattern: c-ffi-*
                  path: dist/c-ffi
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/c-ffi
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: kreuzcrawl-ffi-*.tar.gz
                  token: ${{ steps.app-token.outputs.token }}

    upload-swift-release:
        name: Upload Swift artifact bundle to GitHub Release
        needs: [prepare, swift-artifactbundle]
        if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.swift-artifactbundle.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  name: swift-artifactbundle
                  path: dist/swift

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/swift
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: "*.zip"
                  token: ${{ steps.app-token.outputs.token }}

    upload-elixir-release:
        name: Upload Elixir NIF archives to GitHub Release
        needs: [prepare, elixir-natives, elixir-natives-musl]
        if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.elixir-natives.result == 'success' || needs.elixir-natives-musl.result == 'success') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  pattern: elixir-*
                  path: dist/elixir
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/elixir
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: libkreuzcrawl_nif-*.tar.gz
                  token: ${{ steps.app-token.outputs.token }}

    upload-php-pie-release:
        name: Upload PHP PIE archives to GitHub Release
        needs: [prepare, php-extension]
        if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.php-extension.result == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/download-artifact@v8
              with:
                  pattern: php-package-*
                  path: dist/php-package
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/upload-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  working-directory: dist/php-package
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  assets: |
                      php_*.tgz
                      php_*.tgz.sha256
                      php_*.zip
                      php_*.zip.sha256
                  token: ${{ steps.app-token.outputs.token }}

    # Verifies every expected release asset is present on the GitHub release
    # before the publish-* fan-out depends on those URLs.
    verify-assets:
        name: Verify release assets
        needs:
            - prepare
            - upload-cli-release
            - upload-go-release
            - upload-c-ffi-release
            - upload-elixir-release
            - upload-php-pie-release
        if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && !contains(needs.*.result, 'failure') }}
        runs-on: ubuntu-latest
        permissions:
            # The verify step has to see the draft release that prepare creates;
            # the default GITHUB_TOKEN scope of `contents: read` cannot enumerate
            # drafts. Granting `contents: write` for this job alone lets the
            # default token see the draft release without forcing the App-token
            # plumbing through every caller. Action v1.8.52+ resolves drafts via
            # `GET /repos/{owner}/{repo}/releases` (which requires this scope).
            contents: write
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: kreuzberg-dev/actions/verify-release-assets@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  # App token guarantees draft visibility regardless of the
                  # workflow-level GITHUB_TOKEN permissions configuration.
                  token: ${{ steps.app-token.outputs.token }}
                  expected-assets: |
                      # CLI
                      kreuzcrawl-cli-*.tar.gz
                      kreuzcrawl-cli-*.zip
                      # Go FFI
                      kreuzcrawl-go-*.tar.gz
                      # C FFI
                      kreuzcrawl-ffi-*.tar.gz
                      # Elixir NIF
                      libkreuzcrawl_nif-*.tar.gz

    # ─── Publish jobs ─────────────────────────────────────────────────────

    publish-crates:
        name: Publish crates.io packages
        needs: [prepare, validate-versions, check-cratesio]
        if: ${{ needs.prepare.outputs.release_crates == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-cratesio.outputs.all_exist != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: publish-crates

            - uses: kreuzberg-dev/actions/publish-crates@v1
              with:
                  # Order matters: kreuzcrawl-browser is a hard dep of kreuzcrawl
                  # (path-only deps are rejected by cargo publish), kreuzcrawl is
                  # depended on by kreuzcrawl-bypass, kreuzcrawl-bindings-common,
                  # and kreuzcrawl-cli, so each must land on the index before its
                  # dependents try to resolve.
                  crates: kreuzcrawl-browser kreuzcrawl kreuzcrawl-bypass kreuzcrawl-bindings-common kreuzcrawl-cli
                  version: ${{ needs.prepare.outputs.version }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-pypi:
        name: Publish to PyPI
        needs: [prepare, python-wheels, python-sdist, check-pypi]
        if: ${{ needs.prepare.outputs.release_python == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  pattern: python-wheels-*
                  path: dist
                  merge-multiple: true
            - uses: actions/download-artifact@v8
              with:
                  name: python-sdist
                  path: dist

            - uses: kreuzberg-dev/actions/publish-pypi@v1
              with:
                  packages-dir: dist
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-rubygems:
        name: Publish Ruby gems
        needs: [prepare, ruby-gem, check-rubygems]
        # Allow partial-platform-success: if ruby-gem reports `success` we
        # publish everything; if it reports `failure` (one matrix entry tripped
        # the rb-sys-dock arg-passthrough bug — see task #94) we still publish
        # the platforms that built. The publish-rubygems action just pushes
        # whatever .gem files land in dist/; missing platforms cleanly degrade
        # to "consumers on that platform can't install yet" rather than
        # blocking every other platform's release.
        # `!cancelled() &&` is required: without any status-check function in the
        # expression, GitHub Actions enforces an implicit `success()` over `needs:`,
        # so a single failure in the `ruby-gem` matrix would skip this job even
        # though the explicit `(success || failure)` clause below allows it.
        if: ${{ !cancelled() && needs.prepare.outputs.release_ruby == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.ruby-gem.result == 'success' || needs.ruby-gem.result == 'failure') && (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  pattern: rubygems-*
                  path: dist
                  merge-multiple: true

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.3"
                  bundler-cache: false

            - uses: rubygems/configure-rubygems-credentials@v2.0.0

            - uses: kreuzberg-dev/actions/publish-rubygems@v1
              with:
                  gems-dir: dist
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-node:
        name: Publish Node packages
        needs: [prepare, node-bindings, check-npm]
        if: ${{ needs.prepare.outputs.release_node == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-npm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: actions/download-artifact@v8
              with:
                  pattern: node-bindings-*
                  path: node-artifacts
                  merge-multiple: true

            - uses: kreuzberg-dev/actions/setup-node-workspace@v1
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org/"

            - name: Stage platform packages and main package
              # Inline: kreuzcrawl's per-platform Node artifact layout is bespoke
              # (one tarball per target containing pre-staged npm/<platform>/) and the
              # main package needs an injected optionalDependencies map listing every
              # platform sub-package. Tightly coupled to napi-rs + repo conventions;
              # the generic publish-npm action operates on a single package dir.
              shell: bash
              run: |
                  rm -rf crates/kreuzcrawl-node/npm
                  mkdir -p crates/kreuzcrawl-node/npm
                  for pkg in node-artifacts/*.tar.gz; do
                    tar -xzf "${pkg}" -C crates/kreuzcrawl-node
                  done

                  # Pack each platform sub-package as a tarball
                  cd crates/kreuzcrawl-node/npm
                  for dir in */; do
                    if [ -f "$dir/package.json" ]; then
                      (cd "$dir" && npm pack && mv ./*.tgz ..)
                    fi
                  done
                  cd ../../..

                  # Stamp main package's optionalDependencies with all platform packages
                  tmp_pkg_json="$(mktemp)"
                  optional_deps_json='{}'
                  for platform_pkg_json in crates/kreuzcrawl-node/npm/*/package.json; do
                    name="$(jq -r '.name // empty' "$platform_pkg_json")"
                    version="$(jq -r '.version // empty' "$platform_pkg_json")"
                    [[ -z "$name" || -z "$version" ]] && { echo "Invalid: $platform_pkg_json" >&2; exit 1; }
                    optional_deps_json="$(jq -c --arg n "$name" --arg v "$version" '. + {($n): $v}' <<<"$optional_deps_json")"
                  done
                  jq --argjson deps "$optional_deps_json" '.optionalDependencies = $deps' \
                    crates/kreuzcrawl-node/package.json > "$tmp_pkg_json"
                  mv "$tmp_pkg_json" crates/kreuzcrawl-node/package.json

            - name: Publish platform sub-packages
              # Tolerate per-platform publish failures so the main package and
              # other platforms still ship. RC.45–RC.48 each hit ENEEDAUTH on
              # `@kreuzberg/kreuzcrawl-linux-x64-musl` (npm Trusted Publisher
              # not configured for that specific sub-package — see task #93);
              # without continue-on-error the failure aborted the whole job and
              # blocked the main `@kreuzberg/kreuzcrawl` publish too, leaving
              # consumers unable to install on any platform.
              continue-on-error: true
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  packages-dir: crates/kreuzcrawl-node/npm
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: Wait for npm indexing (linux-x64-gnu)
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/kreuzcrawl-linux-x64-gnu"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "60"

            - name: Wait for npm indexing (linux-arm64-gnu)
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/kreuzcrawl-linux-arm64-gnu"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "60"

            - name: Publish main @kreuzberg/kreuzcrawl package
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: crates/kreuzcrawl-node
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

            - name: Wait for main Node package indexing
              if: ${{ needs.prepare.outputs.dry_run != 'true' }}
              uses: kreuzberg-dev/actions/wait-for-package@v1
              with:
                  registry: npm
                  package: "@kreuzberg/kreuzcrawl"
                  version: ${{ needs.prepare.outputs.version }}
                  max-attempts: "25"

            - name: Build TypeScript wrapper package
              if: ${{ hashFiles('packages/typescript/package.json') != '' }}
              # Inline: pnpm tsc + workspace:* rewrite so npm publish ships an
              # installable package. Tightly coupled to packages/typescript layout.
              shell: bash
              run: |
                  (cd packages/typescript && pnpm install --no-frozen-lockfile && pnpm exec tsc --project tsconfig.json)
                  version="$(node -p "require('./packages/typescript/package.json').version")"
                  PKG_VERSION="$version" node -e '
                    const fs = require("node:fs");
                    const path = "packages/typescript/package.json";
                    const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
                    const ver = process.env.PKG_VERSION;
                    for (const field of ["dependencies", "peerDependencies", "optionalDependencies"]) {
                      if (pkg[field]) {
                        for (const [name, spec] of Object.entries(pkg[field])) {
                          if (typeof spec === "string" && spec.startsWith("workspace:")) {
                            pkg[field][name] = ver;
                          }
                        }
                      }
                    }
                    fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
                  '

            - name: Publish TypeScript wrapper package
              if: ${{ hashFiles('packages/typescript/package.json') != '' }}
              uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: packages/typescript
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-wasm:
        name: Publish WASM package
        needs: [prepare, wasm-bindings, check-wasm]
        if: ${{ needs.prepare.outputs.release_wasm == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-wasm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: actions/download-artifact@v8
              with:
                  name: wasm-bundle
                  path: crates/kreuzcrawl-wasm

            - uses: kreuzberg-dev/actions/setup-node-workspace@v1
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org/"

            - uses: kreuzberg-dev/actions/publish-npm@v1
              with:
                  package-dir: crates/kreuzcrawl-wasm
                  npm-tag: ${{ needs.prepare.outputs.npm_tag }}
                  provenance: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}

    publish-packagist:
        name: Trigger Packagist update
        needs: [prepare, upload-php-pie-release, check-packagist]
        if: ${{ needs.prepare.outputs.release_php == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: kreuzberg-dev/actions/publish-packagist@v1
              with:
                  packagist-username: kreuzberg-dev
                  package-name: kreuzberg-dev/kreuzcrawl
                  version: ${{ needs.prepare.outputs.version }}
                  repository-url: https://github.com/kreuzberg-dev/kreuzcrawl
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

    publish-maven:
        name: Publish Maven (Java) package
        needs: [prepare, java-natives, java-natives-musl, check-maven]
        if: ${{ needs.prepare.outputs.release_java == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: actions/download-artifact@v8
              with:
                  pattern: java-natives-*
                  path: java-natives
                  merge-multiple: true

            - name: Stage natives into resources
              # Inline: copy classifier-bucketed libs from artifact tree into
              # packages/java/src/main/resources/natives/<classifier>/. Tightly
              # coupled to the Maven resource layout — no shared action covers it.
              shell: bash
              run: |
                  mkdir -p packages/java/src/main/resources/natives
                  for dir in java-natives/native/*/; do
                    classifier="$(basename "$dir")"
                    mkdir -p "packages/java/src/main/resources/natives/${classifier}"
                    cp -v "${dir}"/* "packages/java/src/main/resources/natives/${classifier}/"
                  done

            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven
                  server-id: central
                  server-username: MAVEN_USERNAME
                  server-password: MAVEN_PASSWORD
                  gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
                  gpg-passphrase: MAVEN_GPG_PASSPHRASE

            - uses: kreuzberg-dev/actions/setup-maven@v1

            - uses: kreuzberg-dev/actions/configure-maven-gpg@v1
              with:
                  pom-file: packages/java/pom.xml

            - uses: kreuzberg-dev/actions/publish-maven@v1
              with:
                  pom-file: packages/java/pom.xml
                  maven-profile: publish
                  extra-args: -DskipTests
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    publish-nuget:
        name: Publish NuGet package
        needs: [prepare, csharp-natives, csharp-natives-musl, check-nuget]
        if: ${{ needs.prepare.outputs.release_csharp == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: actions/download-artifact@v8
              with:
                  pattern: csharp-natives-*
                  path: csharp-natives
                  merge-multiple: true

            - name: Stage runtimes/<rid>/native into NuGet project
              # Inline: NuGet expects native libs in runtimes/<rid>/native/ adjacent
              # to the project. Copy from artifact tree into the C# project.
              shell: bash
              run: |
                  mkdir -p packages/csharp/runtimes
                  for dir in csharp-natives/runtimes/*/; do
                    rid="$(basename "$dir")"
                    mkdir -p "packages/csharp/runtimes/${rid}/native"
                    cp -v "${dir}native/"* "packages/csharp/runtimes/${rid}/native/"
                  done

            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "8.0.x"

            - name: Pack NuGet package
              # Inline: dotnet pack with the version override against the .slnx; one-liner.
              shell: bash
              run: |
                  dotnet pack packages/csharp/Kreuzcrawl.slnx \
                    -c Release \
                    -p:Version=${{ needs.prepare.outputs.version }} \
                    -o dist/nuget

            - uses: kreuzberg-dev/actions/publish-nuget@v1
              with:
                  packages-dir: dist/nuget
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    publish-hex:
        name: Publish Elixir Hex package
        needs: [prepare, upload-elixir-release, check-hex, publish-crates]
        # The Hex package bundles the generated checksum file, which is built from
        # the NIF assets on the GitHub release. Require upload-elixir-release to have
        # SUCCEEDED (it needs both elixir-natives + elixir-natives-musl) so the
        # checksum file always covers the full platform matrix. Without this, a
        # single flaky NIF leg skips the upload while !cancelled() still lets this
        # job run, publishing an immutable Hex package with an incomplete checksum
        # file (the rc.79 failure mode).
        if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.upload-elixir-release.result == 'success' && needs.prepare.outputs.release_elixir == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-hex.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        environment: hex
        permissions:
            id-token: write
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: true

            - name: Generate checksums from GitHub release
              # generate-elixir-checksums v1.8.52+ downloads NIF assets via
              # authenticated `gh release download` (works against draft
              # releases), so no pre-wait for public CDN propagation is needed.
              # Pass the App token so the action can see the draft release that
              # publish-finalize will promote at the end of the workflow.
              if: needs.prepare.outputs.dry_run != 'true'
              uses: kreuzberg-dev/actions/generate-elixir-checksums@v1
              with:
                  github-repo: ${{ github.repository }}
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  lib-name: kreuzcrawl_nif
                  nif-versions: "2.16,2.17"
                  targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc
                  output-path: packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs
                  token: ${{ steps.app-token.outputs.token }}

            - name: Commit updated checksum file to main
              if: needs.prepare.outputs.dry_run != 'true'
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  git add packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs
                  if git diff --cached --quiet; then
                    echo "No checksum changes to commit — skipping"
                    exit 0
                  fi
                  CHECKSUM_SNAPSHOT="$(mktemp)"
                  cp packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs "$CHECKSUM_SNAPSHOT"
                  git commit -m "chore: update Elixir NIF checksums for v${{ needs.prepare.outputs.version }}"
                  for i in 1 2 3 4 5; do
                    if git push origin HEAD:refs/heads/main; then
                      echo "Push succeeded on attempt $i"
                      exit 0
                    fi
                    echo "Push attempt $i failed; retrying after rebase"
                    if [ "$i" -eq 5 ]; then
                      echo "ERROR: push failed after 5 attempts" >&2
                      exit 1
                    fi
                    git fetch origin main
                    git reset --hard origin/main
                    cp "$CHECKSUM_SNAPSHOT" packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs
                    git add packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs
                    if git diff --cached --quiet; then
                      echo "Remote already has these checksums — done"
                      exit 0
                    fi
                    git commit -m "chore: update Elixir NIF checksums for v${{ needs.prepare.outputs.version }}"
                    sleep $((i * 2))
                  done
              shell: bash

            - uses: erlef/setup-beam@v1
              with:
                  elixir-version: "1.17"
                  otp-version: "27"

            - name: Install Mix dependencies
              run: mix local.hex --force && mix local.rebar --force && mix deps.get
              working-directory: packages/elixir
              shell: bash

            - uses: kreuzberg-dev/actions/publish-hex@v1
              with:
                  package-dir: packages/elixir
                  skip-docs: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

    kotlin-android-natives:
        name: Build kotlin-android natives (${{ matrix.abi }})
        needs: prepare
        if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - abi: arm64-v8a
                      target: aarch64-linux-android
                    - abi: x86_64
                      target: x86_64-linux-android
                    - abi: armeabi-v7a
                      target: armv7-linux-androideabi
                    - abi: x86
                      target: i686-linux-android
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: kotlin-android-${{ matrix.abi }}

            - uses: kreuzberg-dev/actions/setup-android-ndk@v1

            - uses: kreuzberg-dev/actions/build-android-natives@v1
              with:
                  crate-name: kreuzcrawl-ffi
                  lib-name: kreuzcrawl_ffi
                  abis: ${{ matrix.abi }}

            - uses: actions/upload-artifact@v7
              with:
                  name: kotlin-android-${{ matrix.abi }}
                  path: dist/android-natives/${{ matrix.abi }}/
                  if-no-files-found: error

    publish-kotlin-android:
        name: Publish kotlin-android (Maven Central via Gradle)
        needs: [prepare, kotlin-android-natives, check-maven-kotlin-android]
        if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven-kotlin-android.outputs.kotlin_android_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}

            - uses: actions/download-artifact@v8
              with:
                  pattern: kotlin-android-*
                  path: kotlin-android-natives
                  merge-multiple: false

            - name: Stage natives into AAR jniLibs
              run: |
                  for abi in arm64-v8a x86_64 armeabi-v7a x86; do
                    src="kotlin-android-natives/kotlin-android-${abi}"
                    [ -d "$src" ] || continue
                    mkdir -p "packages/kotlin-android/src/main/jniLibs/${abi}"
                    cp -v "${src}/libkreuzcrawl_ffi.so" \
                          "packages/kotlin-android/src/main/jniLibs/${abi}/"
                  done
              shell: bash

            - uses: kreuzberg-dev/actions/publish-maven-gradle@v1
              with:
                  working-directory: packages/kotlin-android
                  gradle-task: publishAndReleaseToMavenCentral
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
              env:
                  MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
                  MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
                  MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
                  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    publish-zig:
        name: Publish Zig package metadata
        # Depend on c-ffi-libraries so the per-target FFI artifacts are
        # available for `multi-platform-ffi-dir` bundling.
        needs: [prepare, zig-package, check-zig, c-ffi-libraries]
        if: ${{ needs.prepare.outputs.release_zig == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-zig.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.ref }}
                  submodules: recursive

            # Download per-target C FFI artifacts produced by c-ffi-libraries
            # and lay them out as ffi-artifacts/<zig-rid>/<libfile> + a shared
            # ffi-artifacts/include/ for publish-zig multi-platform bundling.
            - uses: actions/download-artifact@v8
              with:
                  pattern: c-ffi-*
                  path: dist/c-ffi-downloaded
                  merge-multiple: false

            - name: Lay out FFI artifacts for multi-platform Zig bundle
              env:
                  VERSION: ${{ needs.prepare.outputs.version }}
              shell: bash
              run: |
                  set -euo pipefail
                  # RID convention is per the publish-zig action contract:
                  # linux-x64, linux-arm64, osx-arm64, osx-x64, win-x64.
                  declare -A RID_FOR=(
                    ["x86_64-unknown-linux-gnu"]="linux-x64"
                    ["aarch64-unknown-linux-gnu"]="linux-arm64"
                    ["aarch64-apple-darwin"]="osx-arm64"
                    ["x86_64-apple-darwin"]="osx-x64"
                    ["x86_64-pc-windows-msvc"]="win-x64"
                  )
                  out="ffi-artifacts"
                  mkdir -p "$out/include"
                  for art in dist/c-ffi-downloaded/*/kreuzcrawl-ffi-v"${VERSION}"-*.tar.gz; do
                    [ -f "$art" ] || continue
                    target=$(basename "$art" .tar.gz)
                    target="${target#kreuzcrawl-ffi-v"${VERSION}"-}"
                    rid="${RID_FOR[$target]:-}"
                    if [ -z "$rid" ]; then
                      echo "::warning::Unknown target $target — skipping"
                      continue
                    fi
                    tmp=$(mktemp -d)
                    tar -xzf "$art" -C "$tmp"
                    stage_root=$(find "$tmp" -maxdepth 1 -mindepth 1 -type d | head -1)
                    mkdir -p "$out/$rid"
                    cp "$stage_root"/lib/* "$out/$rid/"
                    cp "$stage_root"/include/*.h "$out/include/" 2>/dev/null || true
                    rm -rf "$tmp"
                  done
                  ls -la "$out"
                  for d in "$out"/*/; do echo "--- $d ---"; ls -la "$d"; done

            - uses: kreuzberg-dev/actions/publish-zig@v1
              with:
                  working-directory: packages/zig
                  tag: ${{ needs.prepare.outputs.tag }}
                  # Override the auto-detected package-name (`kreuzcrawl` from
                  # build.zig.zon) to match the alef-emitted test_app URL pattern
                  # `{crate-name}-zig-v{version}.tar.gz`. Without this, the asset
                  # uploads as `kreuzcrawl-v{version}.tar.gz` while test_apps/zig
                  # fetches `kreuzcrawl-zig-v{version}.tar.gz` → 404 + consumer
                  # build.zig.zon TODO hash.
                  package-name: kreuzcrawl-zig
                  # Bundle per-target FFI libraries + header into the published
                  # tarball so consumers can `zig fetch --save` and link without
                  # downloading anything else.
                  multi-platform-ffi-dir: ffi-artifacts
                  module-name: kreuzcrawl
                  ffi-lib-name: kreuzcrawl_ffi
                  update-release-notes: "true"
                  update-existing: "true"
                  dry-run: ${{ needs.prepare.outputs.dry_run }}
                  token: ${{ steps.app-token.outputs.token }}
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}

    # ─── Homebrew (real-brew bottles) ─────────────────────────────────────
    #
    # Three-job topology mirrors tslp/h2m: update formula source URL+SHA in
    # the tap first so `brew install --build-bottle` has a buildable formula,
    # then build real bottles per platform via `homebrew-build-bottles@v1`,
    # then merge per-platform JSON manifests into the formula's `bottle do`
    # block via `homebrew-merge-bottles@v1`.

    publish-homebrew-formula:
        name: Update Homebrew formula source
        needs: [prepare, check-homebrew, upload-cli-release]
        if: |
            always() &&
            needs.prepare.outputs.release_homebrew == 'true' &&
            needs.prepare.outputs.is_tag == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.upload-cli-release.result == 'success' &&
            (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true')
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: tap-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
                  repositories: homebrew-tap

            - name: Checkout source repo
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Checkout homebrew-tap
              uses: actions/checkout@v6
              with:
                  repository: kreuzberg-dev/homebrew-tap
                  token: ${{ steps.tap-token.outputs.token }}
                  path: homebrew-tap
                  persist-credentials: true

            - name: Update formula source url + sha256
              env:
                  TAG: ${{ needs.prepare.outputs.tag }}
                  VERSION: ${{ needs.prepare.outputs.version }}
                  TAP_DIR: ${{ github.workspace }}/homebrew-tap
              run: scripts/publish/update-homebrew-formula.sh

            - name: Commit and push to tap
              working-directory: homebrew-tap
              env:
                  GH_TOKEN: ${{ steps.tap-token.outputs.token }}
              # Inline: tap-side commit/push — bot identity is repo-specific.
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  if git diff --quiet Formula/; then
                    echo "No formula changes; skipping commit."
                    exit 0
                  fi
                  git add Formula/kreuzcrawl.rb
                  git commit -m "kreuzcrawl ${{ needs.prepare.outputs.version }}"
                  git push origin HEAD

    homebrew-bottles:
        name: Build Homebrew bottle (${{ matrix.bottle_tag }})
        needs: [prepare, publish-homebrew-formula]
        if: |
            always() &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.publish-homebrew-formula.result == 'success'
        runs-on: ${{ matrix.os }}
        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: macos-latest, bottle_tag: arm64_sequoia, install_brew: false }
                    - { os: macos-15-intel, bottle_tag: sequoia, install_brew: false }
                    - { os: ubuntu-latest, bottle_tag: x86_64_linux, install_brew: true }
                    - { os: ubuntu-24.04-arm, bottle_tag: arm64_linux, install_brew: true }
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev

            # actions/checkout@v6 regression on macos-15-intel: the includeIf-gated
            # credential helper isn't honored by git 2.54 on that runner image, so
            # the fetch falls back to interactive auth and fails. v5 writes the
            # extraheader directly into .git/config and works on every runner.
            - uses: actions/checkout@v5
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Free disk space
              if: runner.os == 'Linux'
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - name: Install Homebrew (Linux)
              if: ${{ matrix.install_brew }}
              uses: kreuzberg-dev/actions/install-homebrew-linux@v1

            - name: Build bottles
              uses: kreuzberg-dev/actions/homebrew-build-bottles@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  tap: kreuzberg-dev/homebrew-tap
                  formulas: |
                      kreuzcrawl
                  out-dir: ${{ github.workspace }}/bottle-json
                  github-repo: ${{ github.repository }}
                  token: ${{ steps.app-token.outputs.token }}

            - name: Upload bottle JSON manifests
              uses: actions/upload-artifact@v7
              with:
                  name: homebrew-bottle-json-${{ matrix.bottle_tag }}
                  path: ${{ github.workspace }}/bottle-json/*.json
                  if-no-files-found: error
                  retention-days: 14

    publish-homebrew-bottles:
        name: Merge Homebrew bottle DSL
        needs: [prepare, publish-homebrew-formula, homebrew-bottles]
        if: |
            always() &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.publish-homebrew-formula.result == 'success' &&
            needs.homebrew-bottles.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/create-github-app-token@v2
              id: tap-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
                  repositories: homebrew-tap

            - name: Checkout source repo
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}

            - name: Checkout homebrew-tap
              uses: actions/checkout@v6
              with:
                  repository: kreuzberg-dev/homebrew-tap
                  token: ${{ steps.tap-token.outputs.token }}
                  path: homebrew-tap
                  persist-credentials: true

            - name: Download all bottle JSON manifests
              uses: actions/download-artifact@v8
              with:
                  path: ${{ github.workspace }}/bottle-json
                  pattern: homebrew-bottle-json-*
                  merge-multiple: true

            - name: Merge bottle DSL into formula
              uses: kreuzberg-dev/actions/homebrew-merge-bottles@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  version: ${{ needs.prepare.outputs.version }}
                  tap-dir: ${{ github.workspace }}/homebrew-tap
                  json-dir: ${{ github.workspace }}/bottle-json
                  formulas: |
                      kreuzcrawl
                  github-repo: ${{ github.repository }}

            - name: Commit and push bottle DSL
              working-directory: homebrew-tap
              env:
                  GH_TOKEN: ${{ steps.tap-token.outputs.token }}
              # Inline: tap-side commit/push — bot identity is repo-specific.
              run: |
                  git config user.name "kreuzberg-dev-publisher[bot]"
                  git config user.email "291994444+kreuzberg-dev-publisher[bot]@users.noreply.github.com"
                  if git diff --quiet Formula/; then
                    echo "No bottle DSL changes; skipping commit."
                    exit 0
                  fi
                  git add Formula/kreuzcrawl.rb
                  git commit -m "kreuzcrawl ${{ needs.prepare.outputs.version }} bottles"
                  git push origin HEAD

    # ─── Finalization ─────────────────────────────────────────────────────
    # Post-publish verification runs locally via `task test-apps:run` / `:smoke` /
    # `:comprehensive` against the freshly-published artifacts. Mirrors the
    # canonical sibling pattern (liter-llm, html-to-markdown, tslp). CI's job
    # ends at publish + finalize; the operator runs test_apps locally.

    release-finalize:
        name: Finalize GitHub Release
        needs:
            - prepare
            - verify-assets
            - publish-crates
            - publish-pypi
            - publish-rubygems
            - publish-node
            - publish-wasm
            - publish-packagist
            - publish-maven
            - publish-kotlin-android
            - publish-nuget
            - publish-hex
            - publish-zig
            - publish-homebrew-formula
            - publish-homebrew-bottles
            - upload-cli-release
            - upload-go-release
            - upload-c-ffi-release
            - upload-elixir-release
            - upload-php-pie-release
            - upload-swift-release
        if: |
            always() &&
            !cancelled() &&
            needs.prepare.outputs.is_tag == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            !contains(needs.*.result, 'failure')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: kreuzberg-dev/actions/finalize-release@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  is-prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'true' || 'false' }}
                  go-module-path: packages/go
                  token: ${{ steps.app-token.outputs.token }}

    announce-discord:
        name: Announce release on Discord
        needs:
            - prepare
            - publish-crates
            - publish-pypi
            - publish-rubygems
            - publish-node
            - publish-wasm
            - publish-packagist
            - publish-maven
            - publish-kotlin-android
            - publish-nuget
            - publish-hex
            - publish-zig
            - publish-homebrew-formula
            - publish-homebrew-bottles
            - upload-cli-release
            - upload-go-release
            - upload-c-ffi-release
            - upload-elixir-release
            - upload-php-pie-release
            - upload-swift-release
            - release-finalize
        if: |
            always() &&
            !cancelled() &&
            needs.prepare.outputs.is_tag == 'true' &&
            needs.prepare.outputs.dry_run != 'true' &&
            needs.prepare.outputs.is_prerelease != 'true' &&
            !contains(needs.*.result, 'failure')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/create-github-app-token@v2
              id: app-token
              with:
                  app-id: ${{ secrets.BOT_APP_ID }}
                  private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
                  owner: kreuzberg-dev
            - uses: kreuzberg-dev/actions/announce-release-discord@v1
              with:
                  tag: ${{ needs.prepare.outputs.tag }}
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  project-name: kreuzcrawl
                  token: ${{ steps.app-token.outputs.token }}
