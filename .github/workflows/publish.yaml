        with:
          name: swift-artifactbundle
          path: ${{ steps.bundle.outputs.bundle-zip }}
          if-no-files-found: error
          retention-days: 14

  swift-package:
    name: Build Swift package
    needs: [prepare, check-spi-swift]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && needs.check-spi-swift.outputs.exists != 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: kreuzberg-dev/actions/setup-rust@v1

      - uses: kreuzberg-dev/actions/build-swift-package@v1
        with:
          package-dir: packages/swift
          crate-name: kreuzcrawl-swift

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: swift-package
          path: packages/swift
          retention-days: 14

  zig-package:
    name: Build Zig package (smoke check)
    needs: prepare
    if: ${{ needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: kreuzberg-dev/actions/setup-rust@v1

      - uses: kreuzberg-dev/actions/build-zig-package@v1
        with:
          ffi-crate: kreuzcrawl-ffi
          package-dir: packages/zig

  # ─── GitHub Release asset uploads ─────────────────────────────────────

  upload-cli-release:
    name: Upload CLI binaries to GitHub Release
    needs: [prepare, cli-binaries, cli-musl-binaries]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.cli-binaries.result == 'success' || needs.cli-musl-binaries.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: cli-*
          path: dist/cli
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/cli
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: |
            kreuzcrawl-cli-*.tar.gz
            kreuzcrawl-cli-*.zip

  upload-go-release:
    name: Upload Go FFI archives to GitHub Release
    needs: [prepare, go-ffi-libraries]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.go-ffi-libraries.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: go-ffi-*
          path: dist/go-ffi
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/go-ffi
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: kreuzcrawl-go-*.tar.gz

  upload-c-ffi-release:
    name: Upload C FFI archives to GitHub Release
    needs: [prepare, c-ffi-libraries]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.c-ffi-libraries.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: c-ffi-*
          path: dist/c-ffi
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/c-ffi
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: kreuzcrawl-ffi-*.tar.gz

  upload-elixir-release:
    name: Upload Elixir NIF archives to GitHub Release
    needs: [prepare, elixir-natives, elixir-natives-musl]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.elixir-natives.result == 'success' || needs.elixir-natives-musl.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: elixir-*
          path: dist/elixir
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: libkreuzcrawl_nif-*.tar.gz

  upload-php-pie-release:
    name: Upload PHP PIE archives to GitHub Release
    needs: [prepare, php-extension]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.php-extension.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: php-package-*
          path: dist/php-package
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/php-package
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: |
            php_*.tgz
            php_*.tgz.sha256
            php_*.zip
            php_*.zip.sha256

  # Verifies every expected release asset is present on the GitHub release
  # before the publish-* fan-out depends on those URLs.
  verify-assets:
    name: Verify release assets
    needs:
      - prepare
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: kreuzberg-dev/actions/verify-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          expected-assets: |
            # CLI
            kreuzcrawl-cli-*.tar.gz
            kreuzcrawl-cli-*.zip
            # Go FFI
            kreuzcrawl-go-*.tar.gz
            # C FFI
            kreuzcrawl-ffi-*.tar.gz
            # Elixir NIF
            libkreuzcrawl_nif-*.tar.gz

  # ─── Publish jobs ─────────────────────────────────────────────────────

  publish-crates:
    name: Publish crates.io packages
    needs: [prepare, validate-versions, check-cratesio]
    if: ${{ needs.prepare.outputs.release_crates == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-cratesio.outputs.all_exist != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-crates

      - uses: kreuzberg-dev/actions/publish-crates@v1
        with:
          # Order matters: bindings-common is depended on by everything,
          # kreuzcrawl is depended on by kreuzcrawl-cli.
          crates: kreuzcrawl-bindings-common kreuzcrawl kreuzcrawl-cli
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-pypi:
    name: Publish to PyPI
    needs: [prepare, python-wheels, python-sdist, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8.0.1
        with:
          name: python-sdist
          path: dist

      - uses: kreuzberg-dev/actions/publish-pypi@v1
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-rubygems:
    name: Publish Ruby gems
    needs: [prepare, ruby-gem, check-rubygems]
    if: ${{ needs.prepare.outputs.release_ruby == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: rubygems-*
          path: dist
          merge-multiple: true

      - uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - uses: rubygems/configure-rubygems-credentials@v2.0.0

      - uses: kreuzberg-dev/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-node:
    name: Publish Node packages
    needs: [prepare, node-bindings, check-npm]
    if: ${{ needs.prepare.outputs.release_node == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-npm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: node-bindings-*
          path: crates/kreuzcrawl-node/artifacts
          merge-multiple: true

      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - name: Stage platform packages with napi
        # Inline: napi artifacts → per-platform npm/ subpackages plus build the
        # TypeScript bundle. Tightly coupled to napi-rs layout; not worth a
        # shared action.
        working-directory: crates/kreuzcrawl-node
        shell: bash
        run: |
          pnpm exec napi create-npm-dirs
          pnpm exec napi artifacts --dir artifacts --npm-dir npm
          pnpm build:ts

      - name: Pack platform tarballs for publishing
        # Inline: per-platform package.json patching + npm pack. The wrapper
        # script lives at scripts/publish/pack-node-platform-packages.sh
        # because it is shared with manual reproduction.
        shell: bash
        run: scripts/publish/pack-node-platform-packages.sh crates/kreuzcrawl-node/npm

      - name: Publish platform sub-packages
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          packages-dir: crates/kreuzcrawl-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing (linux-x64-gnu)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/kreuzcrawl-linux-x64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Publish main @kreuzberg/kreuzcrawl package
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/kreuzcrawl-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-wasm:
    name: Publish WASM package
    needs: [prepare, wasm-bindings, check-wasm]
    if: ${{ needs.prepare.outputs.release_wasm == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-wasm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8.0.1
        with:
          name: wasm-bundle
          path: crates/kreuzcrawl-wasm

      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/kreuzcrawl-wasm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          provenance: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-packagist:
    name: Trigger Packagist update
    needs: [prepare, upload-php-pie-release, check-packagist]
    if: ${{ needs.prepare.outputs.release_php == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: kreuzberg-dev/actions/publish-packagist@v1
        with:
          packagist-username: kreuzberg-dev
          package-name: kreuzberg-dev/kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/kreuzberg-dev/kreuzcrawl
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  publish-maven:
    name: Publish Maven (Java) package
    needs: [prepare, java-natives, java-natives-musl, check-maven]
    if: ${{ needs.prepare.outputs.release_java == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: java-natives-*
          path: java-natives
          merge-multiple: true

      - name: Stage natives into resources
        # Inline: copy classifier-bucketed libs from artifact tree into
        # packages/java/src/main/resources/natives/<classifier>/. Tightly
        # coupled to the Maven resource layout — no shared action covers it.
        shell: bash
        run: |
          mkdir -p packages/java/src/main/resources/natives
          for dir in java-natives/native/*/; do
            classifier="$(basename "$dir")"
            mkdir -p "packages/java/src/main/resources/natives/${classifier}"
            cp -v "${dir}"/* "packages/java/src/main/resources/natives/${classifier}/"
          done

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - uses: kreuzberg-dev/actions/setup-maven@v1

      - uses: kreuzberg-dev/actions/configure-maven-gpg@v1
        with:
          pom-file: packages/java/pom.xml

      - uses: kreuzberg-dev/actions/publish-maven@v1
        with:
          pom-file: packages/java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-nuget:
    name: Publish NuGet package
    needs: [prepare, csharp-natives, csharp-natives-musl, check-nuget]
    if: ${{ needs.prepare.outputs.release_csharp == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: csharp-natives-*
          path: csharp-natives
          merge-multiple: true

      - name: Stage runtimes/<rid>/native into NuGet project
        # Inline: NuGet expects native libs in runtimes/<rid>/native/ adjacent
        # to the project. Copy from artifact tree into the C# project.
        shell: bash
        run: |
          mkdir -p packages/csharp/runtimes
          for dir in csharp-natives/runtimes/*/; do
            rid="$(basename "$dir")"
            mkdir -p "packages/csharp/runtimes/${rid}/native"
            cp -v "${dir}native/"* "packages/csharp/runtimes/${rid}/native/"
          done

      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "8.0.x"

      - name: Pack NuGet package
        # Inline: dotnet pack with the version override against the .slnx; one-liner.
        shell: bash
        run: |
          dotnet pack packages/csharp/Kreuzcrawl.slnx \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o dist/nuget

      - uses: kreuzberg-dev/actions/publish-nuget@v1
        with:
          packages-dir: dist/nuget
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-hex:
    name: Publish Elixir Hex package
    needs: [prepare, upload-elixir-release, check-hex]
    if: ${{ needs.prepare.outputs.release_elixir == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-hex.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: erlef/setup-beam@v1.24
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Generate NIF checksum file
        uses: kreuzberg-dev/actions/generate-elixir-checksums@v1
        with:
          github-repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          lib-name: kreuzcrawl_nif
          nif-versions: "2.16,2.17"
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc
          output-path: packages/elixir/checksum-Elixir.Kreuzcrawl.Native.exs

      - uses: kreuzberg-dev/actions/publish-hex@v1
        with:
          package-dir: packages/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  kotlin-android-natives:
    name: Build kotlin-android natives (${{ matrix.abi }})
    needs: prepare
    if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: x86_64
            target: x86_64-linux-android
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
          - abi: x86
            target: i686-linux-android
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: kotlin-android-${{ matrix.abi }}

      - uses: kreuzberg-dev/actions/setup-android-ndk@v1

      - uses: kreuzberg-dev/actions/build-android-natives@v1
        with:
          crate-name: kreuzcrawl-ffi
          lib-name: kreuzcrawl_ffi
          abi: ${{ matrix.abi }}
          target: ${{ matrix.target }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: kotlin-android-${{ matrix.abi }}
          path: dist/android-natives/${{ matrix.abi }}/
          if-no-files-found: error

  publish-kotlin-android:
    name: Publish kotlin-android (Maven Central via Gradle)
    needs: [prepare, kotlin-android-natives, check-maven-kotlin-android]
    if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven-kotlin-android.outputs.kotlin_android_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: kotlin-android-*
          path: kotlin-android-natives
          merge-multiple: false

      - name: Stage natives into AAR jniLibs
        run: |
          for abi in arm64-v8a x86_64 armeabi-v7a x86; do
            src="kotlin-android-natives/kotlin-android-${abi}"
            [ -d "$src" ] || continue
            mkdir -p "packages/kotlin-android/src/main/jniLibs/${abi}"
            cp -v "${src}/libkreuzcrawl_ffi.so" \
                  "packages/kotlin-android/src/main/jniLibs/${abi}/"
          done
        shell: bash

      - uses: kreuzberg-dev/actions/publish-maven-gradle@v1
        with:
          working-directory: packages/kotlin-android
          gradle-task: publishAndReleaseToMavenCentral
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-pub:
    name: Publish Dart package to pub.dev
    needs: [prepare, dart-package, check-pub]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.check-pub.outputs.exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dart-package
          path: packages/dart

      - uses: kreuzberg-dev/actions/publish-pub@v1
        with:
          package-dir: packages/dart
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-swift:
    name: Notify Swift Package Index
    needs: [prepare, swift-package, swift-artifactbundle, check-spi-swift]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.check-spi-swift.outputs.exists != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: kreuzberg-dev/actions/publish-swift@v1
        with:
          working-directory: packages/swift
          tag: ${{ needs.prepare.outputs.tag }}
          ping-spi: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-zig:
    name: Publish Zig package metadata
    needs: [prepare, zig-package, check-zig]
    if: ${{ needs.prepare.outputs.release_zig == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.check-zig.outputs.exists != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: kreuzberg-dev/actions/publish-zig@v1
        with:
          working-directory: packages/zig
          tag: ${{ needs.prepare.outputs.tag }}
          update-release-notes: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Homebrew (CLI bottle build + formula update) ─────────────────────
  #
  # kreuzcrawl ships a single-binary CLI; bottles are synthetic tarballs
  # built from a freshly compiled CLI binary. Topology:
  #   1. homebrew-bottles         — build per-platform bottle tarballs
  #   2. upload-homebrew-bottles  — attach bottles to the GitHub release
  #   3. publish-homebrew         — update the formula in the tap repo

  homebrew-bottles:
    name: Build Homebrew bottle (${{ matrix.bottle_tag }})
    needs: [prepare, check-homebrew]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, bottle_tag: arm64_sequoia }
          - { os: macos-15-intel, bottle_tag: sequoia }
          - { os: ubuntu-latest, bottle_tag: x86_64_linux }
          - { os: ubuntu-24.04-arm, bottle_tag: arm64_linux }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-homebrew-${{ matrix.bottle_tag }}

      - uses: kreuzberg-dev/actions/build-rust-cli@v1
        id: build
        with:
          package-name: kreuzcrawl-cli
          binary-name: kreuzcrawl
          extra-cargo-args: --features all

      - uses: kreuzberg-dev/actions/build-homebrew-bottle@v1
        id: bottle
        with:
          binary-path: ${{ steps.build.outputs.binary-path }}
          formula-name: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          bottle-tag: ${{ matrix.bottle_tag }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: homebrew-bottle-${{ matrix.bottle_tag }}
          path: ${{ steps.bottle.outputs.path }}
          if-no-files-found: error
          retention-days: 14

  upload-homebrew-bottles:
    name: Upload Homebrew bottles to GitHub Release
    needs: [prepare, homebrew-bottles]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.homebrew-bottles.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist/homebrew
          merge-multiple: true

      - uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/homebrew
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          assets: kreuzcrawl-*.bottle.tar.gz

  publish-homebrew:
    name: Update Homebrew formula
    needs: [prepare, check-homebrew, upload-cli-release, upload-homebrew-bottles]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.upload-cli-release.result == 'success' && needs.upload-homebrew-bottles.result == 'success' && (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist/homebrew
          merge-multiple: true

      - name: Configure tap-bot Git credentials
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        # Inline: tap-side credential setup — bot identity is repo-specific.
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global user.name "kreuzberg-bot"
          git config --global user.email "bot@kreuzberg.dev"

      - uses: kreuzberg-dev/actions/publish-homebrew@v1
        with:
          bottles-dir: dist/homebrew
          formula-name: kreuzcrawl
          tap-repo: kreuzberg-dev/homebrew-tap
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          github-repo: ${{ github.repository }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ secrets.HOMEBREW_TOKEN }}

  # ─── Finalization ─────────────────────────────────────────────────────

  release-finalize:
    name: Finalize GitHub Release
    needs:
      - prepare
      - verify-assets
      - publish-crates
      - publish-pypi
      - publish-rubygems
      - publish-node
      - publish-wasm
      - publish-packagist
      - publish-maven
      - publish-kotlin-android
      - publish-nuget
      - publish-hex
      - publish-pub
      - publish-swift
      - publish-zig
      - publish-homebrew
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: kreuzberg-dev/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          is-prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'true' || 'false' }}
          go-module-path: packages/go

  announce-discord:
    name: Announce release on Discord
    needs:
      - prepare
      - publish-crates
      - publish-pypi
      - publish-rubygems
      - publish-node
      - publish-wasm
      - publish-packagist
      - publish-maven
      - publish-kotlin-android
      - publish-nuget
      - publish-hex
      - publish-pub
      - publish-swift
      - publish-zig
      - publish-homebrew
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
      - release-finalize
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.is_prerelease != 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: kreuzberg-dev/actions/announce-release-discord@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          project-name: kreuzcrawl
