name: Publish Release

# Action-first kreuzcrawl release pipeline.
#
# Orchestrates 14 alef language targets:
#   crates · python · node · wasm · ruby · php · cli · homebrew · go · c-ffi
#   java · csharp · elixir · kotlin-android · dart · swift · zig
#
# Mirrors kreuzberg's publish.yaml composition: every registry interaction,
# every multi-platform build, and every release-asset upload routes through
# a shared kreuzberg-dev/actions composite. Inline bash is reserved for
# repo-quirky orchestration only (homebrew bottle assembly, Node platform
# package staging, Maven resource bundling).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v0.3.0-rc.20)"
        required: false
        type: string
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      targets:
        description: "Comma-separated list of release targets, or 'all'"
        required: false
        type: string
        default: "all"
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish targets whose registry version already exists"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      matrix_ref: ${{ steps.meta.outputs.matrix_ref }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_targets: ${{ steps.meta.outputs.release_targets }}
      release_any: ${{ steps.meta.outputs.release_any }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_cli: ${{ steps.meta.outputs.release_cli }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
      release_dart: ${{ steps.meta.outputs.release_dart }}
      release_swift: ${{ steps.meta.outputs.release_swift }}
      release_zig: ${{ steps.meta.outputs.release_zig }}
      release_kotlin_android: ${{ steps.meta.outputs.release_kotlin_android }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ (inputs.republish == true && (inputs.ref || github.event.repository.default_branch)) || inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        uses: kreuzberg-dev/actions/retag-for-republish@v1
        with:
          tag: ${{ inputs.tag || github.event.client_payload.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        uses: kreuzberg-dev/actions/prepare-release-metadata@v1

      - name: Ensure GitHub Release exists for tag
        if: ${{ steps.meta.outputs.is_tag == 'true' && steps.meta.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          target: ${{ steps.meta.outputs.target_sha }}
          notes: "Release ${{ steps.meta.outputs.tag }}"
          draft: "true"
          prerelease: ${{ steps.meta.outputs.is_prerelease }}

  validate-versions:
    name: Validate language manifest versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Validate versions
        uses: kreuzberg-dev/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  # ─── Registry existence checks ────────────────────────────────────────

  check-pypi:
    name: Check PyPI for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pypi
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check npm for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_node == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/kreuzcrawl"
          version: ${{ needs.prepare.outputs.version }}

  check-wasm:
    name: Check npm for existing WASM package
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_wasm == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/kreuzcrawl-wasm"
          version: ${{ needs.prepare.outputs.version }}

  check-rubygems:
    name: Check RubyGems for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check Maven Central for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_java == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: "dev.kreuzberg.kreuzcrawl:kreuzcrawl"
          version: ${{ needs.prepare.outputs.version }}

  check-nuget:
    name: Check NuGet for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_csharp == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: nuget
          package: Kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check Packagist for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: packagist
          package: kreuzberg-dev/kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-cratesio:
    name: Check crates.io for existing versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_crates == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      bindings_common_exists: ${{ steps.check.outputs.exists }}
      kreuzcrawl_exists: ${{ steps.check.outputs.kreuzcrawl_exists }}
      cli_exists: ${{ steps.check.outputs.cli_exists }}
      all_exist: ${{ steps.derive.outputs.all_exist }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: cratesio
          package: kreuzcrawl-bindings-common
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            kreuzcrawl_exists=kreuzcrawl
            cli_exists=kreuzcrawl-cli

      - id: derive
        # Inline: aggregate three check-registry outputs into a single boolean
        # the publish-crates job can guard on. No shared action equivalent.
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "true" \
            && "${{ steps.check.outputs.kreuzcrawl_exists }}" == "true" \
            && "${{ steps.check.outputs.cli_exists }}" == "true" ]]; then
            echo "all_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_exist=false" >> "$GITHUB_OUTPUT"
          fi

  check-hex:
    name: Check Hex.pm for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-pub:
    name: Check pub.dev for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_dart == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pub
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}

  check-spi-swift:
    name: Check Swift Package Index for existing tag
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_swift == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      # Swift has no central registry; SPI auto-discovers GitHub tags, so
      # existence === GitHub release tag exists.
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: swift
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}

  check-zig:
    name: Check Zig package presence (tag-based)
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      # Zig has no central registry; existence === GitHub release tag exists.
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: zig
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}

  check-maven-kotlin-android:
    name: Check Maven Central for kotlin-android package
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_kotlin_android == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      kotlin_android_exists: ${{ steps.check.outputs.kotlin_android_exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: dev.kreuzberg:kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            kotlin_android_exists=dev.kreuzberg:kreuzcrawl-android

  check-homebrew:
    name: Check Homebrew tap for formula
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: homebrew
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: kreuzberg-dev/homebrew-tap

  check-cli:
    name: Check GitHub Release for CLI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_cli == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: github-release
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: kreuzcrawl-cli-
          assets: |
            kreuzcrawl-cli-aarch64-apple-darwin.tar.gz,kreuzcrawl-cli-aarch64-unknown-linux-gnu.tar.gz,kreuzcrawl-cli-aarch64-unknown-linux-musl.tar.gz,kreuzcrawl-cli-x86_64-unknown-linux-gnu.tar.gz,kreuzcrawl-cli-x86_64-unknown-linux-musl.tar.gz,kreuzcrawl-cli-x86_64-pc-windows-msvc.zip

  check-go:
    name: Check GitHub Release for Go FFI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_go == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: github-release
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: kreuzcrawl-go-

  check-c-ffi:
    name: Check GitHub Release for C FFI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_c_ffi == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: github-release
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: kreuzcrawl-ffi-

  check-elixir-release:
    name: Check GitHub Release for Elixir NIF assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: github-release
          package: kreuzcrawl
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: libkreuzcrawl_nif-

  # ─── Build matrix jobs ────────────────────────────────────────────────

  python-wheels:
    name: Build Python wheels (${{ matrix.os }})
    needs: [prepare, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Build wheels
        uses: kreuzberg-dev/actions/build-python-wheels@v1
        with:
          python-version: "3.13"
          package-dir: packages/python
          # PyO3 abi3-py310 → one wheel per platform covers Python 3.10+.
          cibw-build: "cp310-*"
          upload-artifact: "false"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 14

  python-sdist:
    name: Build Python sdist
    needs: [prepare, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist via maturin
        # Inline: maturin sdist is a one-liner; no shared action wraps it.
        # maturin's -m flag requires a Cargo.toml. In kreuzcrawl the Python
        # package (pyproject.toml) and the PyO3 crate (Cargo.toml) are in
        # separate directories, so cd into packages/python/ to let maturin
        # auto-discover pyproject.toml + follow its manifest-path setting.
        shell: bash
        run: |
          python -m pip install --upgrade pip maturin
          mkdir -p dist
          cd packages/python
          maturin sdist -o "$GITHUB_WORKSPACE/dist"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: python-sdist
          path: dist/*.tar.gz
          retention-days: 14

  node-bindings:
    name: Build Node bindings (${{ matrix.target }})
    needs: [prepare, check-npm]
    if: ${{ needs.prepare.outputs.release_node == 'true' && (needs.check-npm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-15-intel, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: publish-node-${{ matrix.target }}

      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "22"

      - name: Build NAPI binding
        uses: kreuzberg-dev/actions/build-node-napi@v1
        with:
          crate-dir: crates/kreuzcrawl-node
          build-command: pnpm exec napi build --release --target ${{ matrix.target }} --platform

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: node-bindings-${{ matrix.target }}
          path: crates/kreuzcrawl-node/*.node
          retention-days: 14

  wasm-bindings:
    name: Build WASM package
    needs: [prepare, check-wasm]
    if: ${{ needs.prepare.outputs.release_wasm == 'true' && (needs.check-wasm.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Configure WASM C compiler
        shell: bash
        run: |
          echo "CC_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/clang" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=${WASI_SDK_PATH}/bin/ar" >> "$GITHUB_ENV"

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          cache-key-prefix: publish-wasm

      - uses: kreuzberg-dev/actions/setup-node-workspace@v1
        with:
          node-version: "22"

      - uses: kreuzberg-dev/actions/build-wasm-package@v1
        with:
          crate-dir: crates/kreuzcrawl-wasm
          pack-tarball: "true"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-bundle
          path: |
            crates/kreuzcrawl-wasm/dist/**
            crates/kreuzcrawl-wasm/dist-node/**
            crates/kreuzcrawl-wasm/dist-web/**
            crates/kreuzcrawl-wasm/pkg/**
            crates/kreuzcrawl-wasm/package.json
          retention-days: 14

  ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, check-rubygems]
    if: ${{ needs.prepare.outputs.release_ruby == 'true' && (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      RB_SYS_CARGO_PROFILE: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, label: linux-x86_64 }
          - { os: ubuntu-24.04-arm, label: linux-aarch64 }
          - { os: macos-latest, label: macos-arm64 }
          - { os: macos-15-intel, label: macos-x86_64 }
          - { os: windows-latest, label: windows-x64 }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-ruby-${{ matrix.label }}

      - uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - uses: kreuzberg-dev/actions/build-ruby-gem@v1
        with:
          package-dir: packages/ruby

      - name: Package gem
        # Inline: rake build emits the .gem under pkg/; no shared action wraps it.
        working-directory: packages/ruby
        shell: bash
        run: bundle exec rake build

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: rubygems-${{ matrix.label }}
          path: packages/ruby/pkg/*.gem
          retention-days: 14

  php-extension:
    name: Build PHP extension (php${{ matrix.php }} ${{ matrix.platform.label }})
    needs: [prepare, check-packagist]
    if: ${{ needs.prepare.outputs.release_php == 'true' && (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
        platform:
          - { os: ubuntu-latest, label: linux-x86_64, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, label: linux-arm64, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, label: macos-arm64, target: aarch64-apple-darwin }
          - { os: macos-15-intel, label: macos-x86_64, target: x86_64-apple-darwin }
          - { os: windows-latest, label: windows-x86_64, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - uses: kreuzberg-dev/actions/setup-php@v1
        with:
          php-version: ${{ matrix.php }}

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.platform.target }}
          cache-key-prefix: publish-php-${{ matrix.platform.label }}-php${{ matrix.php }}

      - uses: kreuzberg-dev/actions/build-php-extension@v1
        with:
          crate-name: kreuzcrawl-php
          lib-name: kreuzcrawl_php
          php-version: ${{ matrix.php }}
          php-ts: nts

      - name: Determine Windows compiler
        if: runner.os == 'Windows'
        id: wincompiler
        shell: pwsh
        run: |
          $compiler = switch ('${{ matrix.php }}') {
            '8.2' { 'vs16' }
            '8.3' { 'vs16' }
            default { 'vs17' }
          }
          "compiler=$compiler" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - uses: kreuzberg-dev/actions/package-php-pie@v1
        with:
          php-version: ${{ matrix.php }}
          php-ts: nts
          target: ${{ matrix.platform.target }}
          windows-compiler: ${{ steps.wincompiler.outputs.compiler }}
          version: ${{ needs.prepare.outputs.version }}
          output-dir: dist/php-package

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: php-package-${{ matrix.platform.label }}-php${{ matrix.php }}
          path: |
            dist/php-package/php_*.tgz
            dist/php-package/php_*.tgz.sha256
            dist/php-package/php_*.zip
            dist/php-package/php_*.zip.sha256
          retention-days: 14

  cli-binaries:
    name: Build CLI binary (${{ matrix.target }})
    needs: [prepare, check-cli]
    if: ${{ needs.prepare.outputs.release_cli == 'true' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-15-intel, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: publish-cli-${{ matrix.target }}

      - uses: kreuzberg-dev/actions/build-rust-cli@v1
        id: build
        with:
          package-name: kreuzcrawl-cli
          binary-name: kreuzcrawl
          target: ${{ matrix.target }}
          extra-cargo-args: --features all

      - name: Package CLI artifact
        # Inline: archive layout (.tar.gz on Unix, .zip on Windows) varies per
        # OS in a way no shared action covers; tiny and self-contained.
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          STAGE="kreuzcrawl-cli-${TARGET}"
          mkdir -p "$STAGE"
          cp LICENSE "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/" 2>/dev/null || true
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$BINARY_PATH" "$STAGE/kreuzcrawl.exe"
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
          else
            cp "$BINARY_PATH" "$STAGE/kreuzcrawl"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
          fi

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cli-${{ matrix.target }}
          path: |
            kreuzcrawl-cli-${{ matrix.target }}.tar.gz
            kreuzcrawl-cli-${{ matrix.target }}.zip
          if-no-files-found: ignore
          retention-days: 14

  cli-musl-binaries:
    name: Build CLI musl binary (${{ matrix.arch }})
    needs: [prepare, check-cli]
    if: ${{ needs.prepare.outputs.release_cli == 'true' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, runner: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { arch: aarch64, runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-musl }
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Build musl CLI via Docker
        # Inline: kreuzcrawl ships a musl CLI built via a custom Dockerfile that
        # bundles libonnxruntime and tesseract for $ORIGIN/lib runtime loading.
        # The shared build-rust-cli action targets host toolchains only.
        shell: bash
        run: |
          docker build -f docker/Dockerfile.musl-build --output type=local,dest=./dist .
          file dist/kreuzcrawl

      - name: Package musl CLI archive
        # Inline: musl artifacts include a sibling lib/ directory the binary
        # dlopens at runtime. Pack into the same archive layout as cli-binaries.
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          STAGE="kreuzcrawl-cli-${TARGET}"
          mkdir -p "$STAGE/lib"
          cp dist/kreuzcrawl "$STAGE/"
          cp dist/lib/* "$STAGE/lib/" 2>/dev/null || true
          cp LICENSE "$STAGE/" 2>/dev/null || true
          cp README.md "$STAGE/" 2>/dev/null || true
          tar -czf "kreuzcrawl-cli-${TARGET}.tar.gz" "$STAGE"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: cli-${{ matrix.target }}
          path: kreuzcrawl-cli-${{ matrix.target }}.tar.gz
          retention-days: 14

