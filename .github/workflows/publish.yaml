        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: ubuntu-latest, platform: linux-x86_64, target: x86_64-unknown-linux-gnu }
                    - { os: ubuntu-24.04-arm, platform: linux-aarch64, target: aarch64-unknown-linux-gnu }
                    - { os: macos-latest, platform: macos-arm64, target: aarch64-apple-darwin }
                    - { os: macos-15-intel, platform: macos-x86_64, target: x86_64-apple-darwin }
                    - { os: windows-latest, platform: windows-x86_64, target: x86_64-pc-windows-msvc }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive

            - name: Free disk space
              if: runner.os == 'Linux'
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-go-${{ matrix.platform }}

            - uses: kreuzberg-dev/actions/build-go-ffi@v1
              with:
                  target: ${{ matrix.target }}
                  crate-name: kreuzcrawl-ffi
                  lib-name: kreuzcrawl_ffi
                  header-path: crates/kreuzcrawl-ffi/include/kreuzcrawl.h
                  archive-name: kreuzcrawl-go-${{ matrix.platform }}.tar.gz
                  output-dir: dist/go-ffi

            - uses: actions/upload-artifact@v7
              with:
                  name: go-ffi-${{ matrix.platform }}
                  path: dist/go-ffi/*.tar.gz
                  if-no-files-found: error
                  retention-days: 14

    c-ffi-libraries:
        name: Build C FFI distribution (${{ matrix.platform }})
        needs: [prepare, check-c-ffi]
        if: ${{ needs.prepare.outputs.release_c_ffi == 'true' && (needs.check-c-ffi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 180
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { os: ubuntu-latest, platform: linux-x86_64, target: x86_64-unknown-linux-gnu }
                    - { os: ubuntu-24.04-arm, platform: linux-aarch64, target: aarch64-unknown-linux-gnu }
                    - { os: macos-latest, platform: macos-arm64, target: aarch64-apple-darwin }
                    - { os: macos-15-intel, platform: macos-x86_64, target: x86_64-apple-darwin }
                    - { os: windows-latest, platform: windows-x86_64, target: x86_64-pc-windows-msvc }
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.prepare.outputs.checkout_ref }}
                  fetch-depth: 0
                  submodules: recursive

            - name: Free disk space
              if: runner.os == 'Linux'
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1

            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  target: ${{ matrix.target }}
                  cache-key-prefix: publish-c-ffi-${{ matrix.platform }}

            - uses: kreuzberg-dev/actions/build-rust-ffi@v1
              with:
                  crate-name: kreuzcrawl-ffi
                  target: ${{ matrix.target }}

            - name: Stage C FFI distribution
              # Inline: bundle library + header + LICENSE into a single tarball
              # named to match the upload-c-ffi-release expected asset prefix.
              env:
                  TARGET: ${{ matrix.target }}
                  PLATFORM: ${{ matrix.platform }}
                  VERSION: ${{ needs.prepare.outputs.version }}
              shell: bash
              run: |
                  # Stage name must match alef-generated test_apps download_ffi.sh:
                  # ASSET_STEM="${FFI_PKG_NAME}-v${VERSION}-${TRIPLE}"
                  # where TRIPLE is the Rust target triple (e.g. aarch64-apple-darwin),
                  # NOT the publish-yaml "platform" label (e.g. macos-arm64).
                  STAGE="kreuzcrawl-ffi-v${VERSION}-${TARGET}"
                  mkdir -p "$STAGE/lib" "$STAGE/include"
                  find "target/${TARGET}/release" -maxdepth 1 -type f \
                    \( -name 'libkreuzcrawl_ffi.*' -o -name 'kreuzcrawl_ffi.dll' \) \
                    -exec cp {} "$STAGE/lib/" \;
                  cp crates/kreuzcrawl-ffi/include/kreuzcrawl.h "$STAGE/include/"
                  cp LICENSE "$STAGE/" 2>/dev/null || true
                  mkdir -p dist/c-ffi
                  tar -czf "dist/c-ffi/${STAGE}.tar.gz" "$STAGE"

            - uses: actions/upload-artifact@v7
              with:
                  name: c-ffi-${{ matrix.platform }}
                  path: dist/c-ffi/*.tar.gz
                  if-no-files-found: error
                  retention-days: 14

