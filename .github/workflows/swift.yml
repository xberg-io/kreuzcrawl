name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: swift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - name: Show Swift version
        run: swift --version
      - uses: kreuzberg-dev/actions/build-swift-package@v1
        with:
          crate-name: kreuzcrawl-swift
          build-profile: dev
      - name: Build Swift package
        working-directory: packages/swift
        run: swift build
      - name: Build mock-server
        working-directory: e2e/rust
        run: cargo build --release --bin mock-server
      - name: Run tests with mock-server
        run: bash scripts/e2e/swift/test.sh
