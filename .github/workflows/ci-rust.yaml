name: CI Rust

on:
    push:
        branches: [main]
        paths:
            - "crates/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
            - ".github/workflows/ci-rust.yaml"
    pull_request:
        branches: [main]
        paths:
            - "crates/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - "rust-toolchain.toml"
            - ".github/workflows/ci-rust.yaml"
    workflow_dispatch:

concurrency:
    group: ci-rust-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: 0
    CARGO_PROFILE_DEV_DEBUG: 0
    RUST_BACKTRACE: short
    RUST_MIN_STACK: 16777216
    BUILD_PROFILE: "ci"
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
    contents: read

jobs:
    rust:
        name: Rust (${{ matrix.os }})
        if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
        runs-on: ${{ matrix.os }}
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04-arm
                    - os: macos-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Free disk space
              if: runner.os == 'Linux'
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1
              with:
                  show-initial: "false"
                  show-final: "true"

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: rust-${{ matrix.os }}
                  use-sccache: "true"

            - name: Setup OpenSSL
              uses: kreuzberg-dev/actions/setup-openssl@v1

            - name: Install Task
              uses: kreuzberg-dev/actions/install-task@v1

            - name: Run clippy
              run: cargo clippy --workspace --exclude kreuzcrawl-ffi --exclude kreuzcrawl-py --exclude kreuzcrawl-php --exclude kreuzcrawl-node --exclude kreuzcrawl-wasm -- -D warnings
              shell: bash

            - name: Run tests
              run: task rust:test:ci
              shell: bash
              env:
                  LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH || '' }}
                  DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH || '' }}
                  DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH || '' }}

            - name: Check no-default-features
              run: cargo check -p kreuzcrawl --no-default-features
              shell: bash

    validate-rust:
        name: Validate Rust
        if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6

            - name: Free disk space
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1
              with:
                  show-initial: "false"
                  show-final: "true"

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: validate-rust
                  use-sccache: "true"

            - name: Setup OpenSSL
              uses: kreuzberg-dev/actions/setup-openssl@v1

            - name: Install Task
              uses: kreuzberg-dev/actions/install-task@v1

            - name: Run Rust lint checks
              run: task rust:lint:check

            - name: Run C lint checks
              run: task c:lint:check

            - name: Install alef
              uses: kreuzberg-dev/actions/install-alef@v1

            - name: Verify binding API parity
              run: alef verify

            - name: Validate vendored C headers match canonical
              shell: bash
              run: |
                  CANONICAL="crates/kreuzcrawl-ffi/include/kreuzcrawl.h"
                  FAIL=0
                  for VENDORED in packages/go/v4/internal/ffi/kreuzcrawl.h packages/ruby/vendor/kreuzcrawl-ffi/kreuzcrawl.h; do
                    if [ -f "$VENDORED" ] && ! diff -q "$CANONICAL" "$VENDORED" > /dev/null 2>&1; then
                      echo "::error::$VENDORED is out of sync with $CANONICAL — run 'alef sync-versions'"
                      diff "$CANONICAL" "$VENDORED" | head -20
                      FAIL=1
                    fi
                  done
                  [ "$FAIL" -eq 0 ] || exit 1
