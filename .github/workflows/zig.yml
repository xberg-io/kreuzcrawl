name: Zig

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: zig-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/zig
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - name: Build kreuzcrawl-ffi
        working-directory: ${{ github.workspace }}
        run: cargo build -p kreuzcrawl-ffi
      - name: Set up Zig
        uses: kreuzberg-dev/actions/setup-zig@v1
        with:
          version: "0.16.0"
      - name: Build Zig project
        run: zig build
      - name: Run tests
        run: zig build test
