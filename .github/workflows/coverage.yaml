name: coverage

on:
    pull_request:
        branches: [main]
        paths:
            - 'crates/kreuzcrawl/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - '.github/workflows/coverage.yaml'
    push:
        branches: [main]
        paths:
            - 'crates/kreuzcrawl/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - '.github/workflows/coverage.yaml'
    workflow_dispatch:

concurrency:
    group: coverage-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: 0
    CARGO_PROFILE_DEV_DEBUG: 0
    RUST_BACKTRACE: short
    RUST_MIN_STACK: 16777216
    RUSTC_WRAPPER: ""
    RUSTFLAGS: "-C instrument-coverage"
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    coverage:
        name: cargo-llvm-cov / kreuzcrawl
        if: github.repository == 'kreuzberg-dev/kreuzcrawl' && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Free disk space
              uses: kreuzberg-dev/actions/free-disk-space-linux@v1
              with:
                  show-initial: "false"
                  show-final: "true"

            - name: Setup Rust
              uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: coverage
                  use-sccache: "false"

            - name: Setup OpenSSL
              uses: kreuzberg-dev/actions/setup-openssl@v1

            - name: Install Task
              uses: kreuzberg-dev/actions/install-task@v1

            - name: Install cargo-llvm-cov
              uses: taiki-e/install-action@cargo-llvm-cov

            - name: Run coverage
              run: cargo llvm-cov --package kreuzcrawl --lcov --output-path lcov.info --ignore-filename-regex '(tests|benches|examples)/'

            - name: Upload to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: ./lcov.info
                  flags: kreuzcrawl
                  fail_ci_if_error: false
                  verbose: true
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
              continue-on-error: true

            - name: Store coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: lcov-kreuzcrawl
                  path: lcov.info
                  retention-days: 14

            - name: Coverage threshold gate
              shell: bash
              run: |
                  # Compute line coverage from lcov.info; warn if < 90%
                  # lcov.info format: LF:<lines found> LH:<lines hit> per file
                  total_lh=$(grep -E '^LH:' lcov.info | awk -F: '{s += $2} END {print s+0}')
                  total_lf=$(grep -E '^LF:' lcov.info | awk -F: '{s += $2} END {print s+0}')
                  if [ "$total_lf" -eq 0 ]; then
                    echo "::error::No coverage data produced"
                    exit 1
                  fi
                  pct=$(awk -v lh="$total_lh" -v lf="$total_lf" 'BEGIN {printf "%.2f", (lh/lf)*100}')
                  echo "Line coverage: ${pct}% (${total_lh} / ${total_lf})"
                  # Threshold: 90% line coverage on kreuzcrawl. During Session 1.5, warn
                  # rather than fail — baseline is moving. Convert to hard fail once stable.
                  awk -v pct="$pct" 'BEGIN { exit (pct < 90.0) }' || {
                    echo "::warning::Coverage ${pct}% is below 90% threshold"
                  }
