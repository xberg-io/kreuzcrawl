[workspace]
members = ["crates/*", "tools/*"]
exclude = ["e2e/rust", ".claude"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"
rust-version = "1.91"

[workspace.dependencies]
anyhow = "1"
camino = "1.2"
clap = { version = "4", features = ["derive"] }
flate2 = "1"
itertools = "0.14"
quick-xml = "0.39"
regex = "1"
reqwest = { version = "0.13", features = ["cookies", "gzip", "brotli"] }
scraper = "0.26"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
url = "2"
walkdir = "2.5"
