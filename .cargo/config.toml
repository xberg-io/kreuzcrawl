[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+bulk-memory", "--cfg", "getrandom_backend=\"wasm_js\""]

[net]
git-fetch-with-cli = true

# Required for ext-php-rs: PHP symbols are resolved at runtime when PHP loads the
# extension, not at link time. Allow undefined symbols to avoid linker errors.
# Excluded from wasm32 targets because rust-lld (WASM linker) does not support
# the -Wl,-undefined,dynamic_lookup flag.
[target.'cfg(all(not(target_os = "windows"), not(target_arch = "wasm32")))']
rustflags = ["-C", "link-arg=-Wl,-undefined,dynamic_lookup"]

[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

[target.i686-pc-windows-msvc]
linker = "rust-lld"

[target.'cfg(target_env = "musl")']
rustflags = ["-C", "target-feature=-crt-static"]
