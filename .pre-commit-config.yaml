default_install_hook_types:
    - pre-commit
    - commit-msg
default_stages:
    - pre-commit
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/|test_documents/|test_apps/|packages/.*/tools/vendor-
repos:
    - repo: https://github.com/Goldziher/gitfluff
      rev: v0.8.0
      hooks:
          - id: gitfluff-lint
            args:
                - --write
            stages:
                - commit-msg
    - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
      rev: v2.1.9
      hooks:
          # Alef verification
          - id: alef-verify

          # Cargo / Rust
          - id: cargo-clippy
            args:
                - --fix
                - --allow-dirty
                - --allow-staged
                - --workspace
                - --exclude=kreuzcrawl-php
                - --exclude=kreuzcrawl-py
                - --exclude=kreuzcrawl-node
                - --exclude=kreuzcrawl-e2e-rust
                - --all-features
                - --all-targets
                - --
                - -D
                - warnings
          - id: cargo-sort
            args:
                - -w
            exclude: ^(e2e/rust/|test_apps/rust/|packages/dart/rust/)Cargo\.toml$
          - id: cargo-machete
            args:
                - crates/
            exclude: ^(e2e/|test_apps/)
          - id: cargo-deny
            args: ["check"]
          - id: rustdoc-lint
            files: ^crates/kreuzcrawl/src/.*\.rs$
            exclude: /tests/
            args:
                - -p
                - kreuzcrawl
          - id: rust-max-lines
            args: ["--max=1000"]
            # Remediation backlog: existing files over the 1,000-LOC ceiling. New
            # files are subject to the cap. Shrink this list when files are split.
            exclude: ^(crates/kreuzcrawl-browser/src/adapter\.rs|crates/kreuzcrawl-browser/src/js/runtime\.rs|crates/kreuzcrawl-browser/src/page\.rs|crates/kreuzcrawl-ffi/src/lib\.rs|crates/kreuzcrawl-node/src/lib\.rs|crates/kreuzcrawl-php/src/lib\.rs|crates/kreuzcrawl-py/src/lib\.rs|crates/kreuzcrawl-wasm/src/lib\.rs|crates/kreuzcrawl/src/engine/mod\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/native/kreuzcrawl_nif/src/lib\.rs|packages/ruby/ext/kreuzcrawl_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs|tools/benchmark-harness/src/output\.rs)$

          # Linters and checks
          - id: ai-rulez-generate

          - id: check-merge-conflict
          - id: check-added-large-files
            exclude: uv.lock|docs/benchmarks/app/
          - id: detect-private-key
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
          - id: typos
            args: ["--force-exclude"]
          - id: check-json
            exclude: tsconfig\.base\.json
          - id: check-yaml
            args:
                - --allow-multiple-documents
                - --unsafe
          - id: check-toml

          - id: actionlint
          - id: gh-actions-updater

          - id: shellcheck

          - id: textlint
            files: ^docs/.*\.md$
            exclude: ^docs/(reference/|api-|snippets/|migration/)
            args:
                - --fix
                - --config
                - .textlintrc.json

          - id: ruff
          - id: mypy
            exclude: e2e/|tests/|scripts/
          - id: pydocstyle
            files: ^packages/python/.*\.py$
            exclude: ^packages/python/(tests/|.*_native\.py$)

          - id: oxlint
          - id: tsc-typecheck
          - id: tsdoc-lint

          - id: golangci-lint
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: govulncheck
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: godoc-lint

          - id: checkstyle
            args:
                - -c
                - packages/java/checkstyle.xml
                - -p
                - packages/java/checkstyle.properties
            exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
          - id: pmd
            exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
          - id: cpd
            args:
                - --minimum-tokens=120
            exclude: ^(test_apps/|e2e/)
          - id: java-verify
            files: ^packages/java/
          - id: javadoc-lint
            files: ^packages/java/src/main/.*\.java$

          - id: detekt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --build-upon-default-config
          - id: ktlint
            files: ^packages/kotlin-android/.*\.kts?$
          - id: kotlin-dokka

          - id: rubocop-lint
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
          - id: steep
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
          - id: yard-coverage
            exclude: ^(e2e/|test_apps/|packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$|Rakefile$))

          - id: dotnet-format-check
            files: ^packages/csharp/.*\.cs$
          - id: cs-xmldoc-lint
            files: ^packages/csharp/Kreuzcrawl/.*\.cs$

          - id: phpstan
            files: ^packages/php/(src|tests)/.*\.php$
            args:
                - analyse
                - --no-progress
                - --configuration
                - packages/php/phpstan.neon
          - id: phpdoc-lint
            files: ^packages/php/src/.*\.php$

          - id: mix-credo
            files: ^packages/elixir/
          - id: ex-doc-coverage
            files: ^packages/elixir/

          - id: swiftlint
            files: ^packages/swift/.*\.swift$
          - id: dart-analyze
            files: ^packages/dart/.*\.dart$
            exclude: ^(test_apps/|e2e/dart/)
          - id: dart-doc-lint
            files: ^packages/dart/lib/.*\.dart$
            exclude: ^packages/dart/lib/src/rust/

          - id: zig-build-check
            files: ^packages/zig/.*\.zig$
          - id: zig-doc-lint

          - id: clang-tidy
            files: ^crates/kreuzcrawl-ffi/tests/c/
          - id: cppcheck
            args:
                - --suppress=unusedStructMember
          - id: hadolint
          - id: alef-docs-fresh
          - id: alef-snippets-validate

          # Formatters
          - id: trailing-whitespace
            exclude: \.github/copilot-instructions\.md
          - id: end-of-file-fixer
            exclude: \.github/copilot-instructions\.md|^docs/reference/
          - id: mixed-line-ending
          - id: shfmt
            args: ["-w", "-i", "2"]
          - id: rumdl-fmt
          - id: cargo-fmt
            args: ["--all"]
          - id: pyproject-fmt
            exclude: ^test_apps/python/pyproject\.toml$
          - id: ruff-format
          - id: oxfmt
          - id: go-fmt
            exclude: ^(e2e/|test_apps/)
          - id: palantir-java-format
          - id: ktfmt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --kotlinlang-style
          - id: rubocop
            files: ^packages/ruby/.*\.rb$
            exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
          - id: dotnet-format
            files: ^packages/csharp/.*\.cs$
          - id: php-cs-fixer
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/stubs/
          - id: mix-format
            files: ^packages/elixir/
          - id: swift-format
            files: ^packages/swift/.*\.swift$
          - id: dart-format
            files: ^packages/dart/.*\.dart$
          - id: zig-fmt
            files: ^packages/zig/.*\.zig$
          - id: clang-format
            args:
                - --style=file
            files: ^crates/kreuzcrawl-ffi/tests/c/
