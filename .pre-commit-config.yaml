default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/|test_documents/|test_apps/|packages/.*/tools/vendor-
repos:
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.2.1
    hooks:
      - id: ai-rulez-generate
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.github/copilot-instructions\.md
      - id: end-of-file-fixer
        exclude: \.github/copilot-instructions\.md|^docs/reference/
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock|docs/benchmarks/app/
      - id: detect-private-key
      - id: check-json
        exclude: tsconfig\.base\.json
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
      - id: check-toml
      - id: check-case-conflict
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.2
    hooks:
      - id: pyproject-fmt
        exclude: ^test_apps/python/pyproject\.toml$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.18
    hooks:
      - id: cargo-sort
        args:
          - -w
        exclude: ^(e2e/rust/|test_apps/rust/|packages/dart/rust/)Cargo\.toml$
      - id: cargo-fmt
        args:
          - --all
      - id: cargo-check
        args:
          - --workspace
          - --exclude=kreuzcrawl-php
          - --exclude=kreuzcrawl-py
          - --exclude=kreuzcrawl-node
          - --exclude=kreuzcrawl-e2e-rust
          - --all-features
          - --all-targets
      - id: cargo-clippy
        args:
          - --fix
          - --allow-dirty
          - --allow-staged
          - --workspace
          - --exclude=kreuzcrawl-php
          - --exclude=kreuzcrawl-py
          - --exclude=kreuzcrawl-node
          - --exclude=kreuzcrawl-e2e-rust
          - --all-features
          - --all-targets
          - --
          - -D
          - warnings
      - id: cargo-machete
        args:
          - crates/
        exclude: ^(e2e/|test_apps/)
      - id: cargo-deny
        args:
          - check
      - id: rustdoc-lint
        files: ^crates/kreuzcrawl/src/.*\.rs$
        exclude: /tests/
        args:
          - -p
          - kreuzcrawl
      - id: pydocstyle
        files: ^packages/python/.*\.py$
        exclude: ^packages/python/(tests/|.*_native\.py$)
      - id: alef-docs-fresh
      - id: javadoc-lint
        files: ^packages/java/src/main/.*\.java$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/Kreuzcrawl/.*\.cs$
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/rust/
      - id: shfmt
        args:
          - -w
          - -i
          - "2"
      - id: shellcheck
      - id: clang-format
        args:
          - --style=file
        files: ^crates/kreuzcrawl-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/kreuzcrawl-ffi/tests/c/
      - id: checkstyle
        args:
          - -c
          - packages/java/checkstyle.xml
          - -p
          - packages/java/checkstyle.properties
        exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
      - id: mypy
        exclude: e2e/|tests/|scripts/
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/(ext/|lib/kreuzcrawl/native\.rb$)
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
      - id: phpstan
        files: ^packages/php/(src|tests)/.*\.php$
        args:
          - analyse
          - --no-progress
          - --configuration
          - packages/php/phpstan.neon
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      - id: ktfmt
        files: ^packages/kotlin-android/.*\.kts?$
        args:
          - --kotlinlang-style
      - id: detekt
        files: ^packages/kotlin-android/.*\.kts?$
        args:
          - --build-upon-default-config
      - id: ktlint
        files: ^packages/kotlin-android/.*\.kts?$
      - id: swift-format
        files: ^packages/swift/.*\.swift$
      - id: swiftlint
        files: ^packages/swift/.*\.swift$
      - id: dart-format
        files: ^packages/dart/.*\.dart$
      - id: dart-analyze
        files: ^packages/dart/.*\.dart$
        exclude: ^(test_apps/|e2e/dart/)
      - id: zig-fmt
        files: ^packages/zig/.*\.zig$
      - id: zig-build-check
        files: ^packages/zig/.*\.zig$
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|api-|snippets/|migration/)
        args:
          - --fix
          - --config
          - .textlintrc.json
      - id: oxlint
      - id: oxfmt
      - id: cppcheck
        args:
          - --suppress=unusedStructMember
      - id: rumdl-fmt
      - id: cpd
        args:
          - --minimum-tokens=120
        exclude: ^(test_apps/|e2e/)
      - id: hadolint
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.19.1
    hooks:
      - id: alef-verify
      - id: alef-sync-versions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.3
    hooks:
      - id: gh-actions-updater
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
        args:
          - --force-exclude
