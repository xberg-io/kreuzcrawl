[workspace]
alef_version = "0.19.21"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "ffi",
  "go",
  "java",
  "csharp",
  "elixir",
  "wasm",
  "dart",
  "kotlin_android",
  "jni",
  "swift",
  "zig",
]

# ---------------------------------------------------------------------------
# Tool selection
# ---------------------------------------------------------------------------
[workspace.tools]
python_package_manager = "uv"
node_package_manager = "pnpm"

# ---------------------------------------------------------------------------
# DTO styles
# ---------------------------------------------------------------------------
[workspace.dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"
dart = "dataclass"
kotlin_android = "data-class"

[workspace.format]
enabled = false

# Java is formatted by Spotless (Eclipse 4.31) via maven verify in prek's
# `java-verify` hook. alef's default `google-java-format` produces different
# output, breaking alef-verify. Use Spotless directly so the two pipelines
# agree on byte-for-byte output.
[workspace.format_overrides.java]
command = "mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true spotless:apply"

# Elixir is formatted by `mix format` via prek's mix-format hook with line_length=120
# (see packages/elixir/.formatter.exs). alef's default emitter wraps `base_url:` early,
# producing output mix-format wants to collapse onto one line. Run mix format directly
# so both pipelines agree.
[workspace.format_overrides.elixir]
command = "cd packages/elixir && mix format"

# PHP is formatted by php-cs-fixer via prek with the project's
# .php-cs-fixer.dist.php config (multi-line function signatures with trailing
# commas). alef's default php emitter produces single-line signatures that
# php-cs-fixer rewrites, breaking the embedded alef:hash. Run the project's
# php-cs-fixer directly so both pipelines produce byte-identical output.
[workspace.format_overrides.php]
command = "cd packages/php && vendor/bin/php-cs-fixer fix src/"

# ---------------------------------------------------------------------------
# Version Sync
# ---------------------------------------------------------------------------
[workspace.sync]
# packages/ruby/lib/kreuzcrawl/version.rb is the version.rb actually loaded by
# the gem; the vestigial ext/kreuzcrawl_rb/src/kreuzcrawl/version.rb entry was
# left behind by older alef versions and is no longer regenerated by sync, so
# it always shows as stale. Dropped.
extra_paths = [
  "package.json",
  "crates/kreuzcrawl-node/package.json",
  "crates/kreuzcrawl-py/src/pyproject.toml",
]

[workspace.citation]
title = "kreuzcrawl"
abstract = "Web crawling and scraping with HTML→Markdown and headless-Chrome fallback."
repository-code = "https://github.com/kreuzberg-dev/kreuzcrawl"
url = "https://kreuzberg.dev"
license = "Elastic-2.0"
date-released = "2026-05-17"

[[workspace.citation.authors]]
family-names = "Hirschfeld"
given-names = "Na'aman"
email = "naaman@kreuzberg.dev"
orcid = "https://orcid.org/0009-0000-2247-5072"

[[workspace.citation.authors]]
name = "Kreuzberg, Inc."

# kreuzcrawl-cli depends on kreuzcrawl via a path; cargo publish requires
# the dep also declares a version. Keep that version in lockstep with the
# workspace bump so every rc tag stays publishable.
[[workspace.sync.text_replacements]]
path = "crates/kreuzcrawl-cli/Cargo.toml"
search = 'kreuzcrawl = \{ path = "../kreuzcrawl", version = "=[^"]*"'
replace = 'kreuzcrawl = { path = "../kreuzcrawl", version = "={version}"'

[[crates]]
name = "kreuzcrawl"
core_import = "kreuzcrawl"
sources = [
  "crates/kreuzcrawl/src/types/config.rs",
  "crates/kreuzcrawl/src/types/results.rs",
  "crates/kreuzcrawl/src/types/discovery.rs",
  "crates/kreuzcrawl/src/types/metadata.rs",
  "crates/kreuzcrawl/src/types/streaming.rs",
  "crates/kreuzcrawl/src/interact/actions.rs",
  "crates/kreuzcrawl/src/error.rs",
  "crates/kreuzcrawl/src/citations.rs",
  "crates/kreuzcrawl/src/bindings.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
path_mappings = { "kreuzcrawl::citations" = "kreuzcrawl", "kreuzcrawl::bindings" = "kreuzcrawl" }
# Default features for all generated language-binding Cargo.toml manifests.
# Per-language overrides under [crates.<lang>] features will replace this list.
features = ["interact", "browser-chromiumoxide"]

[crates.python]
module_name = "_kreuzcrawl"

[crates.python.stubs]
output = "packages/python/kreuzcrawl/"

[crates.node]
package_name = "@kreuzberg/kreuzcrawl"

[crates.ruby]
gem_name = "kreuzcrawl"

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.elixir]
app_name = "kreuzcrawl"
nif_targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
]

[crates.ffi]
prefix = "kcrawl"
header_name = "kreuzcrawl.h"
lib_name = "kreuzcrawl_ffi"
visitor_callbacks = false

[crates.go]
module = "github.com/kreuzberg-dev/kreuzcrawl/packages/go"
package_name = "kreuzcrawl"

[crates.java]
package = "dev.kreuzberg.kreuzcrawl"

[crates.csharp]
namespace = "Kreuzcrawl"
project_file = "packages/csharp/Kreuzcrawl.slnx"

[crates.dart]
pubspec_name = "kreuzcrawl"
lib_name = "kreuzcrawl"
style = "frb"

[crates.kotlin_android]
# Android library (AAR) only — Kotlin/JVM users consume the canonical Java
# package directly (Kotlin/Java interop is total). Panama FFM is unavailable
# on Android (max JDK 17), which is why Android needs its own JNI-based
# package with bundled .so files.
package = "dev.kreuzberg.kreuzcrawl.android"

[crates.swift]
module_name = "Kreuzcrawl"
package_name = "Kreuzcrawl"

[crates.zig]
module_name = "kreuzcrawl"

# wasm32-unknown-unknown cannot compile chromiumoxide: enabling
# `browser-chromiumoxide` (directly or via `interact` → `browser`) pulls
# tokio's net/process features and therefore `mio`, which has no wasm32
# backend (~48 compile errors). Override the default
# ["interact", "browser-chromiumoxide"] feature set with an empty list so the
# wasm crate builds at all; browser/interaction/streaming fixtures are already
# skipped for wasm via per-fixture `skip.languages` and adapter `skip_languages`.
[crates.wasm]
features = []

[crates.output]
python = "crates/kreuzcrawl-py/src/"
node = "crates/kreuzcrawl-node/src/"
ruby = "packages/ruby/ext/kreuzcrawl_rb/src/"
php = "crates/kreuzcrawl-php/src/"
ffi = "crates/kreuzcrawl-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
elixir = "packages/elixir/native/kreuzcrawl_nif/src/"
wasm = "crates/kreuzcrawl-wasm/src/"
dart = "packages/dart/lib/src/"
kotlin_android = "packages/kotlin-android/src/main/kotlin/dev/kreuzberg/kreuzcrawl/android/"
swift = "packages/swift/Sources/Kreuzcrawl/"
zig = "packages/zig/src/"

# Crate-internal items are hidden from alef via `#[cfg_attr(alef, alef(skip))]`
# on the Rust definition (preferred over an exclude list here — keeps the intent
# alongside the type). Currently skipped at source: `CachedPage` (CrawlCache-only
# storage type). `CrawlResult::new` is `pub(crate)` and therefore invisible to
# alef without any directive.

[crates.include]
types = [
  "ExtractionMeta",
  "BrowserMode",
  "BrowserWait",
  "ProxyConfig",
  "AuthConfig",
  "ContentConfig",
  "BrowserConfig",
  "CrawlConfig",
  "DownloadedDocument",
  "ScrapeResult",
  "CrawlPageResult",
  "CrawlResult",
  "SitemapUrl",
  "MapResult",
  "MarkdownResult",
  "LinkType",
  "LinkInfo",
  "ImageSource",
  "ImageInfo",
  "FeedType",
  "FeedInfo",
  "JsonLdEntry",
  "CookieInfo",
  "DownloadedAsset",
  "AssetCategory",
  "ArticleMetadata",
  "HreflangEntry",
  "FaviconInfo",
  "HeadingInfo",
  "ResponseMeta",
  "BrowserExtras",
  "ScrollDirection",
  "PageAction",
  "ActionResult",
  "InteractionResult",
  "PageMetadata",
  "CitationResult",
  "CitationReference",
  "CrawlEngineHandle",
  "BatchScrapeResult",
  "BatchScrapeResults",
  "BatchCrawlResult",
  "BatchCrawlResults",
  "CrawlError",
  "CrawlEvent",
  "CrawlStreamRequest",
  "BatchCrawlStreamRequest",
]
functions = [
  "create_engine",
  "scrape",
  "crawl",
  "map_urls",
  "interact",
  "batch_scrape",
  "batch_crawl",
  "generate_citations",
]

# Streaming adapters — delivered to bindings via alef's per-language streaming
# idiom (Python AsyncIterator, Ruby Enumerator, PHP Generator, Elixir
# Stream.unfold, FFI callbacks for C consumers).
# WASM is excluded via skip_languages: the kreuzcrawl core engine relies on
# tokio's multi-thread runtime which is incompatible with wasm32-unknown-unknown
# (no working fetch/async shim). Go/Java/C# emit `compile_error!` per
# alef-adapters/src/streaming.rs and are explicitly excluded below.
[[crates.adapters]]
name = "crawl_stream"
pattern = "streaming"
core_path = "crawl_stream"
owner_type = "CrawlEngineHandle"
item_type = "CrawlEvent"
error_type = "CrawlError"
request_type = "kreuzcrawl::CrawlStreamRequest"
skip_languages = ["wasm"]

[[crates.adapters.params]]
name = "req"
type = "CrawlStreamRequest"

[[crates.adapters]]
name = "batch_crawl_stream"
pattern = "streaming"
core_path = "batch_crawl_stream"
owner_type = "CrawlEngineHandle"
item_type = "CrawlEvent"
error_type = "CrawlError"
request_type = "kreuzcrawl::BatchCrawlStreamRequest"
skip_languages = ["wasm"]

[[crates.adapters.params]]
name = "req"
type = "BatchCrawlStreamRequest"

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "cd packages/python && uv sync --no-install-project --no-install-workspace"
typecheck = "cd packages/python && uv run --no-sync mypy ."

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
before = "cd packages/php && composer install"
format = "cd packages/php && vendor/bin/php-cs-fixer fix ."
check = "cd packages/php && vendor/bin/phpstan --configuration=phpstan.neon --memory-limit=512M"

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "cargo build --release -p kreuzcrawl-ffi"

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
format = "dotnet format packages/csharp/Kreuzcrawl.slnx"
check = "dotnet format packages/csharp/Kreuzcrawl.slnx --verify-no-changes"

[crates.lint.ffi]
precondition = "test -d crates/kreuzcrawl-ffi/tests"
format = "find crates/kreuzcrawl-ffi/tests -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "cppcheck --std=c11 --enable=warning,style,performance --suppress=missingIncludeSystem --suppress=unusedStructMember crates/kreuzcrawl-ffi/tests/"

[crates.lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[crates.lint.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin-android && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin-android && gradle ktlintCheck --no-daemon"

[crates.lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[crates.lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

# Update overrides target the consumer package dirs (`packages/<lang>/`) rather
# than the alef binding-source output dirs (`crates/kreuzcrawl-{lang}/src/`,
# `packages/ruby/ext/...`), and use `--no-install-project --no-install-workspace`
# to skip maturin/native-build steps that would otherwise fail at lockfile sync.

[crates.update.python]
precondition = "command -v uv >/dev/null 2>&1"
update = "cd packages/python && uv sync --all-extras --no-install-workspace --no-install-project"
upgrade = "cd packages/python && uv sync --all-extras --upgrade --no-install-workspace --no-install-project"

[crates.update.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
update = "cd packages/ruby && bundle update --conservative"
upgrade = "cd packages/ruby && bundle update --all --conservative=false"

[crates.update.elixir]
precondition = "command -v mix >/dev/null 2>&1"
update = "cd packages/elixir && mix deps.update --all"
upgrade = "cd packages/elixir && mix deps.update --all"

[crates.update.php]
precondition = "command -v composer >/dev/null 2>&1"
update = "cd packages/php && composer update --no-interaction"
upgrade = "cd packages/php && composer update --with-all-dependencies --no-interaction"

# `gradle dependencyUpdates` (ben-manes versions plugin 0.52.0) hits a
# ConcurrentModificationException on Gradle 9.x — until that's resolved
# upstream, skip via a precondition that always fails.
[crates.update.kotlin_android]
precondition = "false"

[crates.test.python]
precondition = "command -v python3 >/dev/null 2>&1"
command = "task python:test"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[crates.test.node]
precondition = "command -v node >/dev/null 2>&1"
command = "task node:test"
e2e = "cd e2e/typescript && pnpm dlx vitest run"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
command = "task go:test"
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
precondition = "command -v ruby >/dev/null 2>&1"
command = "task ruby:test"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
command = "task php:test"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
command = "task java:test"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
command = "task csharp:test"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
command = "task elixir:test"
e2e = "cd e2e/elixir && mix test"

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = "cd e2e/wasm && pnpm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test"

[crates.test.c]
precondition = "command -v make >/dev/null 2>&1"
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./test_runner"

[crates.test.kotlin_android]
# Android-only AAR — no JVM JAR to run `gradle test` against. E2E excluded
# because Android tests require an emulator runner (out of scope until a
# kreuzberg-dev/actions/setup-android-emulator action exists).
precondition = "command -v gradle >/dev/null 2>&1"
before = "cargo build --release -p kreuzcrawl-ffi"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = ["cargo build --release -p kreuzcrawl-swift", "bash scripts/setup-swift-bridge.sh"]
command = "cd packages/swift && swift test"
e2e = "cd packages/swift && swift test"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "{ command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0; } && cd packages/dart && dart pub get && cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml && cd ../../.. && cargo build --release -p kreuzcrawl-dart"
command = "cd packages/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"
e2e = "cd e2e/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "cargo build --release -p kreuzcrawl-ffi"
command = "cd packages/zig && zig build test"
e2e = "cd e2e/zig && zig build test"

[crates.publish]
core_crate = "crates/kreuzcrawl"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "rust",
  "python",
  "node",
  "go",
  "java",
  "csharp",
  "php",
  "ruby",
  "elixir",
  "wasm",
  "brew",
  "c",
  "dart",
  "swift",
  "zig",
]
# Fixture categories that exercise internal middleware which the binding
# surface does not expose. Skipped by every per-language e2e generator —
# fixtures stay on disk for the Rust integration suite inside
# `crates/kreuzcrawl/tests/`.
#
# Previously excluded categories (cache, concurrent, download, filter, proxy,
# rate_limit, stealth, strategy, stream, warc) all map to public CrawlConfig
# fields exposed in bindings and are now routed through the appropriate
# named call (scrape/crawl/map/stream).
exclude_categories = ["middleware"]
fields_optional = [
  "markdown",
  "metadata.title",
  "metadata.description",
  "metadata.canonical_url",
  "metadata.keywords",
  "metadata.author",
  "metadata.viewport",
  "metadata.theme_color",
  "metadata.generator",
  "metadata.robots",
  "metadata.html_lang",
  "metadata.html_dir",
  "metadata.og_title",
  "metadata.og_type",
  "metadata.og_image",
  "metadata.og_description",
  "metadata.og_url",
  "metadata.og_site_name",
  "metadata.og_locale",
  "metadata.og_video",
  "metadata.og_audio",
  "metadata.og_locale_alternates",
  "metadata.twitter_card",
  "metadata.twitter_title",
  "metadata.twitter_description",
  "metadata.twitter_image",
  "metadata.twitter_site",
  "metadata.twitter_creator",
  "metadata.dc_title",
  "metadata.dc_creator",
  "metadata.dc_subject",
  "metadata.dc_description",
  "metadata.dc_publisher",
  "metadata.dc_date",
  "metadata.dc_type",
  "metadata.dc_format",
  "metadata.dc_identifier",
  "metadata.dc_language",
  "metadata.dc_rights",
  "metadata.article",
  "metadata.headings",
  "metadata.hreflangs",
  "metadata.favicons",
  "metadata.word_count",
  "response_meta",
  "extracted_data",
  "extraction_meta",
  "screenshot",
  "downloaded_document",
  "detected_charset",
  "crawl_delay",
  "x_robots_tag",
  "markdown.document_structure",
  "markdown.fit_content",
  "json_ld[].name",
  "json_ld.name",
  "links[].rel",
  "links.rel",
  "feeds[].title",
  "feeds.title",
  "images[].alt",
  "images.alt",
  "assets[].mime_type",
  "assets.mime_type",
  "assets[].html_tag",
  "assets.html_tag",
  "action_results[].data",
  "action_results.data",
  "action_results[].error",
  "action_results.error",
]
fields_array = [
  "cookies",
  "links",
  "images",
  "feeds",
  "json_ld",
  "assets",
  "action_results",
  "metadata.headings",
  "metadata.hreflangs",
  "metadata.favicons",
  "pages",
  "urls",
  "results",
  "network_events",
  "markdown.tables",
  "markdown.warnings",
  "browser.network_events",
  "browser.cookies",
]
fields_enum = ["links[].link_type", "assets[].category"]
result_fields = [
  "status_code",
  "content_type",
  "html",
  "body_size",
  "metadata",
  "links",
  "images",
  "feeds",
  "json_ld",
  "is_allowed",
  "crawl_delay",
  "noindex_detected",
  "nofollow_detected",
  "x_robots_tag",
  "is_pdf",
  "was_skipped",
  "detected_charset",
  "main_content_only",
  "auth_header_sent",
  "response_meta",
  "assets",
  "js_render_hint",
  "browser_used",
  "markdown",
  "extracted_data",
  "extraction_meta",
  "screenshot",
  "downloaded_document",
  "browser",
  # Fields present on ScrapeResult/CrawlResult/MapResult/CrawlPageResult/CrawlEvent
  # but historically elided from this allowlist — kept here so the Ruby per-category
  # gate (alef-e2e/src/codegen/ruby.rs:138-149) emits the affected spec files.
  "cookies",
  "urls",
  "final_url",
  "redirect_count",
  "redirect_chain",
  "has_lastmod",
  "is_error",
  "stayed_on_domain",
  "pages_crawled",
]

[crates.e2e.format]
rust = "(cd {dir} && cargo fmt --all)"
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
ruby = "(cd {dir} && bundle exec rubocop --config .rubocop.yaml --autocorrect-all .)"
php = "(cd {dir} && ../../packages/php/vendor/bin/php-cs-fixer fix --rules='@PSR12,@PHP82Migration' --path-mode=override .)"
dart = "cd {dir} && dart format ."
zig = "zig fmt {dir}"

[crates.e2e.call]
function = "scrape"
module = "kreuzcrawl"
result_var = "result"
async = true
returns_result = true
options_type = "CrawlConfig"

[[crates.e2e.call.args]]
name = "engine"
field = "config"
type = "handle"
optional = false

[[crates.e2e.call.args]]
