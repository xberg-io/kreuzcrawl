[crates.e2e.fields_c_types]
# ScrapeResult primitive fields (non-char* return types from the FFI)
"scrape_result.status_code" = "uint16_t"
"scrape_result.body_size" = "uintptr_t"
"scrape_result.is_allowed" = "int32_t"
"scrape_result.crawl_delay" = "uint64_t"
"scrape_result.noindex_detected" = "int32_t"
"scrape_result.nofollow_detected" = "int32_t"
"scrape_result.is_pdf" = "int32_t"
"scrape_result.was_skipped" = "int32_t"
"scrape_result.main_content_only" = "int32_t"
"scrape_result.auth_header_sent" = "int32_t"
"scrape_result.js_render_hint" = "int32_t"
"scrape_result.browser_used" = "int32_t"
# ScrapeResult JSON array fields (char* — use alef_json_array_count for .length)
"scrape_result.links" = "char*"
"scrape_result.assets" = "char*"
"scrape_result.images" = "char*"
"scrape_result.feeds" = "char*"
"scrape_result.json_ld" = "char*"
# ScrapeResult nested opaque handle fields
"scrape_result.metadata" = "PageMetadata"
"scrape_result.response_meta" = "ResponseMeta"
"scrape_result.markdown" = "MarkdownResult"
"scrape_result.extraction_meta" = "ExtractionMeta"
"scrape_result.downloaded_document" = "DownloadedDocument"
"scrape_result.browser" = "BrowserExtras"
# ScrapeResult fields that are NOT present in the C FFI (exist on CrawlResult/MapResult
# but not ScrapeResult). Marked "skip" so the C codegen omits assertions that reference
# them via the default scrape call rather than generating non-existent accessor calls.
"scrape_result.is_error" = "skip"
"scrape_result.stayed_on_domain" = "skip"
"scrape_result.redirect_count" = "skip"
"scrape_result.redirect_chain" = "skip"
"scrape_result.final_url" = "skip"
"scrape_result.cookies" = "skip"
"scrape_result.urls" = "skip"
"scrape_result.has_lastmod" = "skip"
"scrape_result.pages_crawled" = "skip"
# CrawlResult JSON array fields (char* — use alef_json_array_count for .length)
"crawl_result.pages" = "char*"
"crawl_result.cookies" = "char*"
# CrawlResult primitive fields
"crawl_result.stayed_on_domain" = "int32_t"
"crawl_result.redirect_count" = "uintptr_t"
# CrawlResult char* fields
"crawl_result.final_url" = "char*"
"crawl_result.error" = "char*"
# MapResult fields
"map_result.urls" = "char*"
# has_lastmod is a computed field (derived from urls[*].lastmod presence) with no
# dedicated C FFI accessor yet — skip in C until kcrawl_map_result_has_lastmod is added.
"map_result.has_lastmod" = "skip"
# InteractionResult fields — action_results is a JSON array returned as char*
"interaction_result.action_results" = "char*"
# MarkdownResult.citations is a bool field, returned as int32_t from the C accessor
"markdown_result.citations" = "int32_t"
# PageMetadata primitive fields
"page_metadata.word_count" = "uintptr_t"
# PageMetadata JSON array fields (char* — use alef_json_array_count for .length)
"page_metadata.headings" = "char*"
"page_metadata.hreflangs" = "char*"
"page_metadata.favicons" = "char*"

