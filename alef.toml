[crates.scaffold]
description = "High-performance web crawling engine"
license = "Elastic-2.0"
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"
authors = ["Kreuzberg Team"]
keywords = ["crawl", "scrape", "web", "spider"]

[crates.scaffold.cargo]

[crates.readme]
template_dir = "readme_templates"
snippets_dir = "docs/snippets"

[crates.readme.languages.python]
name = "Python"
template = "language_package.md"
output_path = "packages/python/README.md"
package_manager = ["pip"]
package_name = "kreuzcrawl"
install_command = "pip install kreuzcrawl"
description = """
Python bindings for **kreuzcrawl** — a high-performance Rust web crawling engine for structured
data extraction. Powered by PyO3, with async support, full metadata extraction, and Markdown
conversion. Wheels published for Linux, macOS, and Windows.
"""

[crates.readme.languages.python.snippets]
basic_usage = "getting-started/basic_usage.md"

[crates.readme.languages.typescript]
name = "TypeScript (Node.js)"
template = "language_package.md"
output_path = "packages/typescript/README.md"
package_manager = ["pnpm"]
package_name = "@kreuzberg/kreuzcrawl"
install_command = "pnpm add @kreuzberg/kreuzcrawl"
description = """
Node.js bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Powered by
