# Named call config for batch_scrape — auto-selected for fixtures in the
# `batch` category whose input contains `batch_urls`. `batch_crawl` is routed
# separately via its more-specific id_prefix and takes precedence because the
# alef router scans names alphabetically and `batch_crawl` < `batch_scrape`.
[crates.e2e.calls.batch_scrape]
function = "batch_scrape"
module = "kreuzcrawl"
result_var = "result"
async = true
returns_result = true
options_type = "CrawlConfig"
select_when = { category = "batch", input_has = "batch_urls" }
# Elixir, zig, swift bindings and brew CLI do not expose batch functions.
# For elixir/zig/swift: unsafe NIF tuple marshalling with mixed-type arrays.
# For brew: CLI only supports scrape, crawl, map subcommands.
skip_languages = ["elixir", "zig", "swift", "brew"]
# BatchScrapeResults wraps Vec<BatchScrapeResult> with precomputed counts.
# Top-level fields: results (Vec), total_count, completed_count, failed_count.
# Per-element fields (url, result, error) are kept here so fixtures asserting on
# `results[].url`, `results[].error`, etc. pass the result_fields gate.
result_fields = [
  "results",
  "total_count",
  "completed_count",
  "failed_count",
  "url",
  "result",
  "error",
]

[[crates.e2e.calls.batch_scrape.args]]
name = "engine"
field = "config"
type = "handle"
optional = false

[[crates.e2e.calls.batch_scrape.args]]
name = "urls"
field = "batch_urls"
type = "mock_url_list"
optional = false
owned = true

[crates.e2e.calls.batch_scrape.overrides.python]
