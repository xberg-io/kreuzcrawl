# `stayed_on_domain` is a CrawlPageResult field included here so fixtures asserting
# at root level pass the result_fields gate (per-page lowering handled elsewhere).
result_fields = [
  "pages",
  "final_url",
  "redirect_count",
  "was_skipped",
  "error",
  "cookies",
  "stayed_on_domain",
]

