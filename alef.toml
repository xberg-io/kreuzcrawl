[workspace]
alef_version = "0.15.24"
languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm"]

# ---------------------------------------------------------------------------
# Tool selection
# ---------------------------------------------------------------------------
[workspace.tools]
python_package_manager = "uv"
node_package_manager = "pnpm"

# ---------------------------------------------------------------------------
# DTO styles
# ---------------------------------------------------------------------------
[workspace.dto]
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"

# Java is formatted by Spotless (Eclipse 4.31) via maven verify in prek's
# `java-verify` hook. alef's default `google-java-format` produces different
# output, breaking alef-verify. Use Spotless directly so the two pipelines
# agree on byte-for-byte output.
[workspace.format_overrides.java]
command = "mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true spotless:apply"

# ---------------------------------------------------------------------------
# Version Sync
# ---------------------------------------------------------------------------
[workspace.sync]
extra_paths = [
  "package.json",
  "crates/kreuzcrawl-node/package.json",
  "packages/ruby/ext/kreuzcrawl_rb/src/kreuzcrawl/version.rb",
]

# kreuzcrawl-cli depends on kreuzcrawl via a path; cargo publish requires
# the dep also declares a version. Keep that version in lockstep with the
# workspace bump so every rc tag stays publishable.
[[workspace.sync.text_replacements]]
path = "crates/kreuzcrawl-cli/Cargo.toml"
search = 'kreuzcrawl = \{ path = "../kreuzcrawl", version = "=[^"]*"'
replace = 'kreuzcrawl = { path = "../kreuzcrawl", version = "={version}"'

[[crates]]
name = "kreuzcrawl"
core_import = "kreuzcrawl"
sources = [
  "crates/kreuzcrawl/src/types/config.rs",
  "crates/kreuzcrawl/src/types/results.rs",
  "crates/kreuzcrawl/src/types/discovery.rs",
  "crates/kreuzcrawl/src/types/metadata.rs",
  "crates/kreuzcrawl/src/error.rs",
  "crates/kreuzcrawl/src/citations.rs",
  "crates/kreuzcrawl/src/bindings.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
path_mappings = { "kreuzcrawl::citations" = "kreuzcrawl", "kreuzcrawl::bindings" = "kreuzcrawl" }

[crates.python]
module_name = "_kreuzcrawl"

[crates.python.stubs]
output = "packages/python/kreuzcrawl/"

[crates.node]
package_name = "@kreuzberg/kreuzcrawl"

[crates.ruby]
gem_name = "kreuzcrawl"

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.elixir]
app_name = "kreuzcrawl"

[crates.ffi]
prefix = "kcrawl"
header_name = "kreuzcrawl.h"
lib_name = "kreuzcrawl_ffi"
visitor_callbacks = false

[crates.go]
module = "github.com/kreuzberg-dev/kreuzcrawl/packages/go"
package_name = "kreuzcrawl"

[crates.java]
package = "dev.kreuzberg.kreuzcrawl"

[crates.csharp]
namespace = "Kreuzcrawl"
project_file = "packages/csharp/Kreuzcrawl.slnx"

[crates.output]
python = "crates/kreuzcrawl-py/src/"
node = "crates/kreuzcrawl-node/src/"
ruby = "packages/ruby/ext/kreuzcrawl_rb/src/"
php = "crates/kreuzcrawl-php/src/"
ffi = "crates/kreuzcrawl-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
elixir = "packages/elixir/native/kreuzcrawl_nif/src/"
wasm = "crates/kreuzcrawl-wasm/src/"

[crates.exclude]
types = ["CachedPage", "InteractionResult", "ActionResult", "CrawlEvent"]
functions = ["generate_citations"]
methods = ["CrawlResult.new"]

[crates.include]
types = [
  "ExtractionMeta",
  "BrowserMode",
  "BrowserWait",
  "ProxyConfig",
  "AuthConfig",
  "ContentConfig",
  "BrowserConfig",
  "CrawlConfig",
  "DownloadedDocument",
  "ScrapeResult",
  "CrawlPageResult",
  "CrawlResult",
  "SitemapUrl",
  "MapResult",
  "MarkdownResult",
  "LinkType",
  "LinkInfo",
  "ImageSource",
  "ImageInfo",
  "FeedType",
  "FeedInfo",
  "JsonLdEntry",
  "CookieInfo",
  "DownloadedAsset",
  "AssetCategory",
  "ArticleMetadata",
  "HreflangEntry",
  "FaviconInfo",
  "HeadingInfo",
  "ResponseMeta",
  "PageMetadata",
  "CitationResult",
  "CitationReference",
  "CrawlEngineHandle",
  "BatchScrapeResult",
  "BatchCrawlResult",
  "CrawlError",
]
functions = ["create_engine", "scrape", "crawl", "map_urls", "batch_scrape", "batch_crawl"]

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "cd packages/python && uv sync"
typecheck = "cd packages/python && uv run mypy ."

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/typescript/"
check = "pnpm dlx oxlint packages/typescript/"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
before = "cd packages/php && composer install"
format = "cd packages/php && vendor/bin/php-cs-fixer fix ."
check = "cd packages/php && vendor/bin/phpstan --configuration=phpstan.neon --memory-limit=512M"

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "cargo build --release -p kreuzcrawl-ffi"

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
format = "dotnet format packages/csharp/Kreuzcrawl.slnx"
check = "dotnet format packages/csharp/Kreuzcrawl.slnx --verify-no-changes"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/wasm/"
check = "pnpm dlx oxlint packages/wasm/"

[crates.lint.ffi]
precondition = "test -d crates/kreuzcrawl-ffi/tests"
format = "find crates/kreuzcrawl-ffi/tests -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "cppcheck --std=c11 --enable=warning,style,performance --suppress=missingIncludeSystem --suppress=unusedStructMember crates/kreuzcrawl-ffi/tests/"

[crates.test.python]
precondition = "command -v python3 >/dev/null 2>&1"
command = "task python:test"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[crates.test.node]
precondition = "command -v node >/dev/null 2>&1"
command = "task node:test"
e2e = "cd e2e/typescript && pnpm dlx vitest run"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
command = "task go:test"
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
precondition = "command -v ruby >/dev/null 2>&1"
command = "task ruby:test"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
command = "task php:test"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
command = "task java:test"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
command = "task csharp:test"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
command = "task elixir:test"
e2e = "cd e2e/elixir && mix test"

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
e2e = "cd e2e/wasm && pnpm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test"

[crates.test.c]
precondition = "command -v make >/dev/null 2>&1"
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./test_runner"

[crates.publish]
core_crate = "crates/kreuzcrawl"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "rust",
  "python",
  "node",
  "go",
  "java",
  "csharp",
  "php",
  "ruby",
  "elixir",
  "wasm",
  "brew",
  "c",
]
# Fixture categories that exercise internal middleware (cache, proxy, rate-limit,
# stream, etc.) which the binding surface does not expose. Skipped by every
# per-language e2e generator — fixtures stay on disk for the Rust integration
# suite inside `crates/kreuzcrawl/tests/`.
exclude_categories = [
  "cache",
  "concurrent",
  "download",
  "filter",
  "interaction",
  "middleware",
  "proxy",
  "rate_limit",
  "stealth",
  "strategy",
  "stream",
  "warc",
]
fields_optional = [
