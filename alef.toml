languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm"]

[crate]
name = "kreuzcrawl"
core_import = "kreuzcrawl"
sources = [
    "crates/kreuzcrawl/src/types/config.rs",
    "crates/kreuzcrawl/src/types/results.rs",
    "crates/kreuzcrawl/src/types/discovery.rs",
    "crates/kreuzcrawl/src/types/metadata.rs",
    "crates/kreuzcrawl/src/error.rs",
    "crates/kreuzcrawl/src/citations.rs",
    "crates/kreuzcrawl/src/bindings.rs",
]
version_from = "Cargo.toml"
workspace_root = "."

[include]
types = [
    # Config
    "CrawlConfig",
    "BrowserConfig",
    "BrowserMode",
    "BrowserWait",
    "ProxyConfig",
    "AuthConfig",
    "ExtractionMeta",
    # Results
    "ScrapeResult",
    "CrawlResult",
    "CrawlPageResult",
    "MapResult",
    "MarkdownResult",
    "SitemapUrl",
    "CachedPage",
    "DownloadedDocument",
    "InteractionResult",
    "ActionResult",
    # Discovery
    "LinkInfo",
    "LinkType",
    "ImageInfo",
    "ImageSource",
    "FeedInfo",
    "FeedType",
    "JsonLdEntry",
    "CookieInfo",
    "DownloadedAsset",
    "AssetCategory",
    "CrawlEvent",
    # Metadata
    "PageMetadata",
    "ArticleMetadata",
    "ResponseMeta",
    "FaviconInfo",
    "HeadingInfo",
    "HreflangEntry",
    # Citations
    "CitationResult",
    "CitationReference",
    # Error
    "CrawlError",
    # Adapter
    "CrawlEngineHandle",
    "BatchScrapeResult",
    "BatchCrawlResult",
]
functions = ["create_engine", "scrape", "crawl", "map_urls", "batch_scrape", "batch_crawl"]

[exclude]
functions = []
types = []
methods = ["CrawlConfig.validate", "CrawlResult.unique_normalized_urls", "CrawlResult.new"]

[output]
python = "crates/kreuzcrawl-py/src/"
node = "crates/kreuzcrawl-node/src/"
ruby = "packages/ruby/ext/kreuzcrawl_rb/src/"
php = "crates/kreuzcrawl-php/src/"
ffi = "crates/kreuzcrawl-ffi/src/"
go = "packages/go/"
elixir = "packages/elixir/native/kreuzcrawl_nif/src/"
wasm = "crates/kreuzcrawl-wasm/src/"

[python]
module_name = "_kreuzcrawl"

[python.stubs]
output = "packages/python/kreuzcrawl/"

[node]
package_name = "@kreuzberg/kreuzcrawl"

[ffi]
prefix = "kcrawl"
header_name = "kreuzcrawl.h"
lib_name = "kreuzcrawl_ffi"
visitor_callbacks = false

[go]
module = "github.com/kreuzberg-dev/kreuzcrawl"
package_name = "kreuzcrawl"

[java]
package = "dev.kreuzberg.kreuzcrawl"

[csharp]
namespace = "Kreuzcrawl"

[ruby]
gem_name = "kreuzcrawl"

[ruby.stubs]
output = "packages/ruby/sig/"

[elixir]
app_name = "kreuzcrawl"

[scaffold]
description = "High-performance web crawling engine"
license = "Elastic-2.0"
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"
authors = ["Kreuzberg Team"]
keywords = ["crawl", "scrape", "web", "spider"]

[e2e]
fixtures = "fixtures"
output = "e2e"
languages = ["rust", "python", "node", "go", "java", "csharp", "php", "ruby", "elixir", "wasm", "brew"]
fields_optional = [
    "markdown",
    "metadata.title",
    "metadata.description",
    "metadata.canonical_url",
    "metadata.keywords",
    "metadata.author",
    "metadata.viewport",
    "metadata.theme_color",
    "metadata.generator",
    "metadata.robots",
    "metadata.html_lang",
    "metadata.html_dir",
    "metadata.og_title",
    "metadata.og_type",
    "metadata.og_image",
    "metadata.og_description",
    "metadata.og_url",
    "metadata.og_site_name",
    "metadata.og_locale",
    "metadata.og_video",
    "metadata.og_audio",
    "metadata.og_locale_alternates",
    "metadata.twitter_card",
    "metadata.twitter_title",
    "metadata.twitter_description",
    "metadata.twitter_image",
    "metadata.twitter_site",
    "metadata.twitter_creator",
    "metadata.dc_title",
    "metadata.dc_creator",
    "metadata.dc_subject",
    "metadata.dc_description",
    "metadata.dc_publisher",
    "metadata.dc_date",
    "metadata.dc_type",
    "metadata.dc_format",
    "metadata.dc_identifier",
    "metadata.dc_language",
    "metadata.dc_rights",
    "metadata.article",
    "metadata.headings",
    "metadata.hreflangs",
    "metadata.favicons",
    "metadata.word_count",
    "response_meta",
    "extracted_data",
    "extraction_meta",
    "screenshot",
    "downloaded_document",
    "detected_charset",
    "crawl_delay",
    "x_robots_tag",
    "markdown.document_structure",
    "markdown.citations",
    "markdown.fit_content",
    "json_ld[].name",
    "json_ld.name",
    "links[].rel",
    "links.rel",
    "feeds[].title",
    "feeds.title",
    "images[].alt",
    "images.alt",
    "assets[].mime_type",
    "assets.mime_type",
    "assets[].html_tag",
    "assets.html_tag",
]
fields_array = ["links", "images", "feeds", "json_ld", "assets"]
fields_enum = [
    "links[].link_type",
    "browser.js_render_hint",
    "browser.browser_used",
    "assets[].category",
]
result_fields = [
    "status_code",
    "content_type",
    "html",
    "body_size",
    "metadata",
    "links",
    "images",
    "feeds",
    "json_ld",
    "is_allowed",
    "crawl_delay",
    "noindex_detected",
    "nofollow_detected",
    "x_robots_tag",
    "is_pdf",
    "was_skipped",
    "detected_charset",
    "main_content_only",
    "auth_header_sent",
    "response_meta",
    "assets",
    "js_render_hint",
    "browser_used",
    "markdown",
    "extracted_data",
    "extraction_meta",
    "screenshot",
    "downloaded_document",
]

[e2e.call]
function = "scrape"
module = "kreuzcrawl"
result_var = "result"
async = true

[[e2e.call.args]]
name = "engine"
field = "config"
type = "handle"
optional = false

[[e2e.call.args]]
name = "url"
field = "url"
type = "mock_url"
optional = false

[e2e.call.overrides.python]
module = "kreuzcrawl"
function = "scrape"
handle_dict_types = ["auth"]

[e2e.call.overrides.python.handle_nested_types]
browser = "BrowserConfig"
proxy = "ProxyConfig"
auth = "AuthConfig"

[e2e.call.overrides.node]
module = "@kreuzberg/kreuzcrawl"
function = "scrape"

[e2e.call.overrides.go]
module = "github.com/kreuzberg-dev/kreuzcrawl"
function = "Scrape"

[e2e.call.overrides.java]
class = "dev.kreuzberg.kreuzcrawl.Kreuzcrawl"

[e2e.call.overrides.rust]
crate_name = "kreuzcrawl"

[e2e.call.overrides.elixir]
handle_struct_type = "CrawlConfig"
handle_atom_list_fields = ["asset_types"]

[e2e.call.overrides.brew]
function = "scrape"
cli_args = ["--format", "json"]

[e2e.fields]
# Existing
"title" = "metadata.title"
"description" = "metadata.description"

# robots.* → direct ScrapeResult fields
"robots.is_allowed" = "is_allowed"
"robots.crawl_delay" = "crawl_delay"
"robots.noindex_detected" = "noindex_detected"
"robots.nofollow_detected" = "nofollow_detected"
"robots.x_robots_tag" = "x_robots_tag"

# content.* → direct ScrapeResult fields
"content.body_size" = "body_size"
"content.detected_charset" = "detected_charset"
"content.is_pdf" = "is_pdf"
"content.main_content_only" = "main_content_only"
"content.was_skipped" = "was_skipped"

# og.* → metadata.og_* fields
"og.title" = "metadata.og_title"
"og.type" = "metadata.og_type"
"og.image" = "metadata.og_image"
"og.description" = "metadata.og_description"
"og.url" = "metadata.og_url"
"og.site_name" = "metadata.og_site_name"
"og.locale" = "metadata.og_locale"
"og.video" = "metadata.og_video"
"og.audio" = "metadata.og_audio"
"og.locale_alternate" = "metadata.og_locale_alternates"

# twitter.* → metadata.twitter_* fields
"twitter.card" = "metadata.twitter_card"
"twitter.card_type" = "metadata.twitter_card"
"twitter.title" = "metadata.twitter_title"
"twitter.description" = "metadata.twitter_description"
"twitter.image" = "metadata.twitter_image"
"twitter.site" = "metadata.twitter_site"
"twitter.creator" = "metadata.twitter_creator"

# dublin_core.* → metadata.dc_* fields
"dublin_core.title" = "metadata.dc_title"
"dublin_core.creator" = "metadata.dc_creator"
"dublin_core.subject" = "metadata.dc_subject"
"dublin_core.description" = "metadata.dc_description"
"dublin_core.publisher" = "metadata.dc_publisher"
"dublin_core.date" = "metadata.dc_date"
"dublin_core.type" = "metadata.dc_type"
"dublin_core.format" = "metadata.dc_format"
"dublin_core.identifier" = "metadata.dc_identifier"
"dublin_core.language" = "metadata.dc_language"
"dublin_core.rights" = "metadata.dc_rights"

# metadata field name corrections
"metadata.lang" = "metadata.html_lang"
"metadata.dir" = "metadata.html_dir"

# json_ld field corrections
"json_ld[].type" = "json_ld[].schema_type"
"json_ld.type" = "json_ld[].schema_type"

# asset field corrections
"assets[].category" = "assets[].asset_category"

[e2e.packages.rust]
path = "../../crates/kreuzcrawl"

[e2e.packages.python]
name = "kreuzcrawl"
path = "../../packages/python"

[e2e.packages.node]
name = "@kreuzberg/kreuzcrawl"
path = "../../crates/kreuzcrawl-node"

[e2e.packages.go]
module = "github.com/kreuzberg-dev/kreuzcrawl"
path = "../../packages/go"

[test.python]
command = "task python:test"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[test.node]
command = "task node:test"
e2e = "cd e2e/typescript && npx vitest run"

[test.go]
command = "task go:test"
e2e = "cd e2e/go && go test ./... -count=1"

[test.ruby]
command = "task ruby:test"

[test.php]
command = "task php:test"

[test.java]
command = "task java:test"

[test.csharp]
command = "task csharp:test"

[test.elixir]
command = "task elixir:test"
e2e = "cd e2e/elixir && mix test"

[test.wasm]
e2e = "cd e2e/wasm && npm test"

[test.rust]
e2e = "cd e2e/rust && cargo test"

[test.c]
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./test_runner"

# ---------------------------------------------------------------------------
# README Generation
# ---------------------------------------------------------------------------
[readme]
template_dir = "readme_templates"
snippets_dir = "docs/snippets"

[readme.languages.python]
name = "Python"
template = "language_package.md"
output_path = "packages/python/README.md"
package_manager = ["pip"]
package_name = "kreuzcrawl"
install_command = "pip install kreuzcrawl"
description = """
Python bindings for **kreuzcrawl** — a high-performance Rust web crawling engine for structured
data extraction. Powered by PyO3, with async support, full metadata extraction, and Markdown
conversion. Wheels published for Linux, macOS, and Windows.
"""

[readme.languages.python.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.typescript]
name = "TypeScript (Node.js)"
template = "language_package.md"
output_path = "packages/typescript/README.md"
package_manager = ["npm"]
package_name = "@kreuzberg/kreuzcrawl"
install_command = "npm install @kreuzberg/kreuzcrawl"
description = """
Node.js bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Powered by
NAPI-RS with full TypeScript types, async/await support, and native performance.
"""

[readme.languages.typescript.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.ruby]
name = "Ruby"
template = "language_package.md"
output_path = "packages/ruby/README.md"
package_manager = ["gem"]
package_name = "kreuzcrawl"
install_command = "gem install kreuzcrawl"
description = """
Ruby bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Powered by
Magnus with native Ruby objects, full metadata extraction, and Markdown conversion.
"""

[readme.languages.ruby.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.go]
name = "Go"
template = "language_package.md"
output_path = "packages/go/README.md"
package_manager = ["go"]
package_name = "github.com/kreuzberg-dev/kreuzcrawl/packages/go"
install_command = "go get github.com/kreuzberg-dev/kreuzcrawl/packages/go"
description = """
Go bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Uses cgo with
the C FFI layer for native performance with idiomatic Go error handling.
"""

[readme.languages.go.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.java]
name = "Java"
template = "language_package.md"
output_path = "packages/java/README.md"
package_manager = ["maven"]
package_name = "dev.kreuzberg.kreuzcrawl:kreuzcrawl"
install_command = """
<dependency>
    <groupId>dev.kreuzberg.kreuzcrawl</groupId>
    <artifactId>kreuzcrawl</artifactId>
    <version>{{ version }}</version>
</dependency>
"""
description = """
Java bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Uses the
Panama FFM API (Java 21+) for zero-overhead native calls with full type safety.
"""

[readme.languages.java.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.csharp]
name = "C#"
template = "language_package.md"
output_path = "packages/csharp/README.md"
package_manager = ["nuget"]
package_name = "Kreuzcrawl"
install_command = "dotnet add package Kreuzcrawl"
description = """
C# / .NET bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Uses
P/Invoke with the C FFI layer, supporting .NET 8+ with async/await and nullable reference types.
"""

[readme.languages.csharp.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.php]
name = "PHP"
template = "language_package.md"
output_path = "packages/php/README.md"
package_manager = ["composer"]
package_name = "kreuzberg-dev/kreuzcrawl"
install_command = "composer require kreuzberg-dev/kreuzcrawl"
description = """
PHP bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Native PHP
extension via ext-php-rs with typed properties, PHP 8.2+ support, and PHPStan type stubs.
"""

[readme.languages.php.snippets]
basic_usage = "getting-started/basic_usage.md"

[readme.languages.elixir]
name = "Elixir"
template = "language_package.md"
output_path = "packages/elixir/README.md"
package_manager = ["hex"]
package_name = "kreuzcrawl"
install_command = """
def deps do
  [{:kreuzcrawl, "~> {{ version }}"}]
end
"""
description = """
Elixir bindings for **kreuzcrawl** — a high-performance Rust web crawling engine. Uses Rustler
NIFs for native BEAM integration with OTP-compatible error tuples and ResourceArc handles.
"""

[readme.languages.elixir.snippets]
basic_usage = "getting-started/basic_usage.md"

