[crates.e2e.format]
rust = "(cd {dir} && cargo fmt --all)"
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
ruby = "(cd {dir} && bundle exec rubocop --config .rubocop.yaml --autocorrect-all .)"
php = "(cd {dir} && ../../packages/php/vendor/bin/php-cs-fixer fix --rules='@PSR12,@PHP82Migration' --path-mode=override .)"

[crates.e2e.call]
function = "scrape"
module = "kreuzcrawl"
result_var = "result"
async = true
returns_result = true

[[crates.e2e.call.args]]
name = "engine"
field = "config"
type = "handle"
optional = false

[[crates.e2e.call.args]]
name = "url"
field = "url"
type = "mock_url"
optional = true

[crates.e2e.call.overrides.python]
module = "kreuzcrawl"
function = "scrape"
handle_dict_types = ["auth"]

[crates.e2e.call.overrides.python.handle_nested_types]
browser = "BrowserConfig"
proxy = "ProxyConfig"
auth = "AuthConfig"

[crates.e2e.call.overrides.node]
module = "@kreuzberg/kreuzcrawl"
function = "scrape"

[crates.e2e.call.overrides.go]
module = "github.com/kreuzberg-dev/kreuzcrawl/packages/go"
function = "Scrape"

[crates.e2e.call.overrides.java]
class = "dev.kreuzberg.kreuzcrawl.Kreuzcrawl"

[crates.e2e.call.overrides.rust]
crate_name = "kreuzcrawl"

[crates.e2e.call.overrides.elixir]
handle_struct_type = "CrawlConfig"
handle_atom_list_fields = ["asset_types"]

[crates.e2e.call.overrides.php]
function = "scrape"

[crates.e2e.call.overrides.wasm]
handle_config_type = "WasmCrawlConfig"

[crates.e2e.call.overrides.brew]
function = "scrape"
cli_args = ["--format", "json", "--browser-mode", "never"]

[crates.e2e.call.overrides.c]
function = "scrape"
result_type = "ScrapeResult"
c_engine_factory = "CrawlConfig"

# Named call config for batch_scrape — auto-selected when fixture input contains "batch_urls".
[crates.e2e.calls.batch_scrape]
function = "batch_scrape"
module = "kreuzcrawl"
result_var = "result"
async = true
returns_result = true
result_is_array = true
select_when = { input_has = "batch_urls" }
# Elixir binding does not expose batch functions (unsafe NIF tuple marshalling with mixed-type arrays).
skip_languages = ["elixir"]

[[crates.e2e.calls.batch_scrape.args]]
name = "engine"
field = "config"
type = "handle"
optional = false

[[crates.e2e.calls.batch_scrape.args]]
name = "urls"
field = "batch_urls"
type = "json_object"
optional = false

[crates.e2e.calls.batch_scrape.overrides.python]
function = "batch_scrape"
module = "kreuzcrawl"

[crates.e2e.calls.batch_scrape.overrides.node]
function = "batchScrape"
module = "@kreuzberg/kreuzcrawl"

[crates.e2e.calls.batch_scrape.overrides.go]
function = "BatchScrape"
module = "github.com/kreuzberg-dev/kreuzcrawl/packages/go"

[crates.e2e.calls.batch_scrape.overrides.php]
function = "batchScrape"

