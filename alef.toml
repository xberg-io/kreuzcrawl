  "metadata.twitter_site",
  "metadata.twitter_creator",
  "metadata.dc_title",
  "metadata.dc_creator",
  "metadata.dc_subject",
  "metadata.dc_description",
  "metadata.dc_publisher",
  "metadata.dc_date",
  "metadata.dc_type",
  "metadata.dc_format",
  "metadata.dc_identifier",
  "metadata.dc_language",
  "metadata.dc_rights",
  "metadata.article",
  "metadata.headings",
  "metadata.hreflangs",
  "metadata.favicons",
  "metadata.word_count",
  "response_meta",
  "extracted_data",
  "extraction_meta",
  "screenshot",
  "downloaded_document",
  "detected_charset",
  "crawl_delay",
  "x_robots_tag",
  "markdown.document_structure",
  "markdown.citations",
  "markdown.fit_content",
  "json_ld[].name",
  "json_ld.name",
  "links[].rel",
  "links.rel",
  "feeds[].title",
  "feeds.title",
  "images[].alt",
  "images.alt",
