version: "3"

tasks:
    install:
        desc: Install Zig dependencies
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig build

    setup:
        desc: Setup Zig environment
        cmds:
            - task: zig:install

    build:
        desc: Build Zig package (depends on Rust FFI)
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-ffi
            - zig build

    build:dev:
        desc: Build Zig package in debug mode
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - cargo build -p kreuzcrawl-ffi
            - zig build

    build:release:
        desc: Build Zig package in release mode (optimized)
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-ffi
            - zig build -Doptimize=ReleaseFast

    build:ci:
        desc: Build Zig package in CI mode
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-ffi
            - zig build

    test:
        desc: Run Zig tests
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig build test

    test:ci:
        desc: Run Zig tests (CI mode)
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig build test

    lint:
        desc: Lint and format Zig code with auto-fix
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt src

    lint:check:
        desc: Check Zig code linting without modifications
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt --check src

    format:
        desc: Format Zig code
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt src

    format:check:
        desc: Check Zig code formatting
        dir: packages/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt --check src

    clean:
        desc: Clean Zig build artifacts
        dir: packages/zig
        cmds:
            - rm -rf zig-cache
            - rm -rf zig-out

    update:
        desc: Update Zig dependencies
        dir: packages/zig
        cmds:
            - echo "Zig uses system libraries - manage via build.zig.zon"

    e2e:generate:
        desc: Generate and format Zig E2E tests from fixtures
        cmds:
            - cmd: bash scripts/task/e2e-generate.sh zig
              platforms: [linux, darwin]
            - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
              platforms: [windows]
            - task: e2e:format

    e2e:format:
        desc: Format Zig E2E code
        dir: e2e/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt src

    e2e:lint:
        desc: Lint Zig E2E code
        dir: e2e/zig
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - zig fmt --check src

    e2e:test:
        desc: Run generated Zig E2E tests
        precondition: "command -v zig >/dev/null 2>&1"
        cmds:
            - cmd: bash scripts/e2e/zig/test.sh
              platforms: [linux, darwin]
            - cmd: echo "Zig e2e not yet supported on Windows - use WSL or CI"
              platforms: [windows]

    e2e:verify:
        desc: Regenerate and validate Zig E2E suite (build + generate + lint + test)
        cmds:
            - task: build
            - task: e2e:generate
            - task: e2e:lint
            - task: e2e:test
