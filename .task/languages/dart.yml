version: "3"

tasks:
    install:
        desc: Install Dart dependencies
        dir: packages/dart
        cmds:
            - dart pub get

    setup:
        desc: Setup Dart environment
        cmds:
            - task: dart:install

    build:
        desc: Build Dart package
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0
            - dart pub get
            - cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml
            - cargo build --release -p kreuzcrawl-dart
            - dart pub get

    build:dev:
        desc: Build Dart package (dev mode)
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0
            - dart pub get
            - cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml
            - cargo build -p kreuzcrawl-dart
            - dart pub get

    build:release:
        desc: Build Dart package (release mode)
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0
            - dart pub get
            - cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml
            - cargo build --release -p kreuzcrawl-dart
            - dart pub get

    build:ci:
        desc: Build Dart package (CI mode)
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0
            - dart pub get
            - cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml
            - cargo build --release -p kreuzcrawl-dart
            - dart pub get

    test:
        desc: Run Dart tests
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        env:
            DYLD_FALLBACK_LIBRARY_PATH: "{{.PWD}}/target/release"
            LD_LIBRARY_PATH: "{{.PWD}}/target/release"
            FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR: "../../target/release"
        cmds:
            - dart test

    test:ci:
        desc: Run Dart tests (CI mode)
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        env:
            DYLD_FALLBACK_LIBRARY_PATH: "{{.PWD}}/target/release"
            LD_LIBRARY_PATH: "{{.PWD}}/target/release"
            FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR: "../../target/release"
        cmds:
            - dart test

    lint:
        desc: Lint and format Dart code with auto-fix
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart format .

    lint:check:
        desc: Check Dart code linting without modifications
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart format . --set-exit-if-changed

    format:
        desc: Format Dart code
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart format .

    format:check:
        desc: Check Dart code formatting
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart format . --set-exit-if-changed

    clean:
        desc: Clean Dart build artifacts
        dir: packages/dart
        cmds:
            - rm -rf .dart_tool
            - rm -rf build
            - rm -rf pubspec.lock

    update:
        desc: Update Dart dependencies to latest versions
        dir: packages/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart pub upgrade

    e2e:generate:
        desc: Generate and format Dart E2E tests from fixtures
        cmds:
            - cmd: bash scripts/task/e2e-generate.sh dart
              platforms: [linux, darwin]
            - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
              platforms: [windows]
            - task: e2e:format

    e2e:format:
        desc: Format Dart E2E code
        dir: e2e/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart pub get
            - dart format .

    e2e:lint:
        desc: Lint Dart E2E code
        dir: e2e/dart
        precondition: "command -v dart >/dev/null 2>&1"
        cmds:
            - dart format . --set-exit-if-changed

    e2e:test:
        desc: Run generated Dart E2E tests
        precondition: "command -v dart >/dev/null 2>&1"
        deps:
            - task: :_dev_wf:mock-server:rebuild
            - task: build
        env:
            DYLD_FALLBACK_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
            LD_LIBRARY_PATH: "{{.ROOT_DIR}}/target/release"
            # FRB rejects relative paths under macOS hardened-runtime — must be absolute.
            FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR: "{{.ROOT_DIR}}/target/release"
        cmds:
            - cd e2e/dart && dart pub get
            - bash scripts/task/dart-e2e-test.sh

    e2e:verify:
        desc: Regenerate and validate Dart E2E suite (generate + lint + test)
        cmds:
            - task: e2e:generate
            - task: e2e:lint
            - task: e2e:test
