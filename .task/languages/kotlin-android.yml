version: "3"

includes:
  _cfg:
    taskfile: ../config/vars.yml
    internal: true
  _platforms:
    taskfile: ../config/platforms.yml
    internal: true

tasks:
  install:
    desc: Resolve kotlin-android gradle dependencies
    dir: packages/kotlin-android
    cmds:
      - gradle dependencies --no-daemon

  setup:
    desc: Setup kotlin-android (alias for install)
    cmds:
      - task: install

  build:
    desc: Build kotlin-android AAR (uses {{.BUILD_PROFILE}})
    cmds:
      - task: build:{{.BUILD_PROFILE | default "release"}}

  build:dev:
    desc: Build kotlin-android AAR in debug mode
    dir: packages/kotlin-android
    cmds:
      - gradle assembleDebug --no-daemon

  build:release:
    desc: Build kotlin-android AAR in release mode
    dir: packages/kotlin-android
    cmds:
      - gradle assembleRelease --no-daemon

  build:ci:
    desc: Build kotlin-android AAR in CI mode
    dir: packages/kotlin-android
    cmds:
      - gradle assembleRelease --no-daemon

  lint:
    desc: Run ktlint with autocorrect
    dir: packages/kotlin-android
    cmds:
      - gradle ktlintFormat --no-daemon

  lint:check:
    desc: Run ktlint in check-only mode
    dir: packages/kotlin-android
    cmds:
      - gradle ktlintCheck --no-daemon

  format:
    desc: Run ktlint format (alias for lint)
    cmds:
      - task: lint

  format:check:
    desc: Run ktlint check (alias for lint:check)
    cmds:
      - task: lint:check

  clean:
    desc: Clean kotlin-android build artefacts
    dir: packages/kotlin-android
    cmds:
      - cmd: gradle clean --no-daemon
        ignore_error: true
      - cmd: rm -rf build .gradle
        platforms: [linux, darwin]

  test:e2e:
    desc: >
      Run kotlin-android instrumented e2e tests on a running emulator.
      Requires ANDROID_HOME (and an emulator already started, e.g. via
      `emulator -avd kreuzberg-test-34 -no-window` or the GHA
      `reactivecircus/android-emulator-runner` action). Fails fast if the
      SDK is not available.
    dir: packages/kotlin-android
    preconditions:
      - sh: '[ -n "$ANDROID_HOME" ]'
        msg: >
          ANDROID_HOME is unset — install the Android SDK (e.g.
          `brew install android-commandlinetools` then
          `sdkmanager "platform-tools" "emulator" "platforms;android-34"
          "system-images;android-34;google_apis;arm64-v8a"`) and export
          ANDROID_HOME before invoking this task.
      - sh: "command -v adb >/dev/null"
        msg: "adb not on PATH — add $ANDROID_HOME/platform-tools to PATH"
    cmds:
      - adb wait-for-device
      - gradle connectedDebugAndroidTest --no-daemon -Pmock_server_url={{.MOCK_SERVER_URL | default "http://10.0.2.2:8765"}}

  test:e2e:skip-if-no-sdk:
    desc: >
      Umbrella-safe variant of test:e2e — skips silently when ANDROID_HOME
      is unset so `task test:e2e:all` works on machines without the SDK.
    cmds:
      - cmd: |
          if [ -z "$ANDROID_HOME" ]; then
            echo "kotlin-android:test:e2e — ANDROID_HOME unset, skipping."
            exit 0
          fi
          task kotlin-android:test:e2e
