version: "3"

tasks:
    install:
        desc: Install Swift dependencies
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift package resolve

    setup:
        desc: Setup Swift environment
        cmds:
            - task: swift:install

    build:
        desc: Build Swift package
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-swift
            - bash scripts/setup-swift-bridge.sh release
            - cd packages/swift && swift build

    build:dev:
        desc: Build Swift package (dev mode)
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - cargo build -p kreuzcrawl-swift
            - bash scripts/setup-swift-bridge.sh debug
            - cd packages/swift && swift build

    build:release:
        desc: Build Swift package (release mode)
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-swift
            - bash scripts/setup-swift-bridge.sh release
            - cd packages/swift && swift build -c release

    build:ci:
        desc: Build Swift package (CI mode)
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - cargo build --release -p kreuzcrawl-swift
            - bash scripts/setup-swift-bridge.sh release
            - cd packages/swift && swift build

    test:
        desc: Run Swift tests
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift test

    test:ci:
        desc: Run Swift tests (CI mode)
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift test

    lint:
        desc: Lint and format Swift code with auto-fix
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format

    lint:check:
        desc: Check Swift code linting without modifications
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format --lint

    format:
        desc: Format Swift code
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format

    format:check:
        desc: Check Swift code formatting
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format --lint

    clean:
        desc: Clean Swift build artifacts
        dir: packages/swift
        cmds:
            - swift package clean
            - rm -rf .build

    update:
        desc: Update Swift dependencies to latest versions
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift package update

    e2e:generate:
        desc: Generate and format Swift E2E tests from fixtures
        cmds:
            - cmd: bash scripts/task/e2e-generate.sh swift
              platforms: [linux, darwin]
            - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
              platforms: [windows]
            - task: e2e:format

    e2e:format:
        desc: Format Swift E2E code
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format

    e2e:lint:
        desc: Lint Swift E2E code
        dir: packages/swift
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - swift format --lint

    e2e:test:
        desc: Run generated Swift E2E tests
        precondition: "command -v swift >/dev/null 2>&1"
        cmds:
            - cmd: bash scripts/e2e/swift/test.sh
              platforms: [linux, darwin]
            - cmd: echo "Swift e2e not yet supported on Windows - use WSL or CI"
              platforms: [windows]

    e2e:verify:
        desc: Regenerate and validate Swift E2E suite (build + generate + lint + test)
        cmds:
            - task: build
            - task: e2e:generate
            - task: e2e:lint
            - task: e2e:test
