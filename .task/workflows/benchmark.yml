version: "3"

tasks:
  download:
    desc: "Download scrape-evals dataset from HuggingFace"
    cmds:
      - cargo run -p benchmark-harness -- download --dataset scrape-evals --output tools/benchmark-harness/datasets

  run:
    desc: "Run benchmarks in cached mode"
    cmds:
      - cargo run -p benchmark-harness --release -- run --fixtures tools/benchmark-harness/datasets --mode cached --output tools/benchmark-harness/results

  run:live:
    desc: "Run benchmarks against live URLs (rate-limited)"
    cmds:
      - cargo run -p benchmark-harness --release -- run --fixtures tools/benchmark-harness/datasets --mode live --save-cache --rate-limit-ms 500 --output tools/benchmark-harness/results

  profile:
    desc: "Profile benchmark with flamegraphs"
    cmds:
      - cargo run -p benchmark-harness --release --features profiling -- profile --fixtures tools/benchmark-harness/datasets --output tools/benchmark-harness/profiles

  report:
    desc: "Generate summary report from results"
    cmds:
      - cargo run -p benchmark-harness -- report tools/benchmark-harness/results/results.json --output tools/benchmark-harness/report

  validate:
    desc: "Validate fixtures without running benchmarks"
    cmds:
      - cargo run -p benchmark-harness -- validate --fixtures tools/benchmark-harness/datasets
