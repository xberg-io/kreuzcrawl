version: "3"

tasks:
    mock-server:start:
        desc: Start the alef-generated mock HTTP server (background)
        cmds:
            - |
                ./e2e/rust/target/release/mock-server ./fixtures > .mock-server.out &
                echo $! > .mock-server.pid
                sleep 1
                grep MOCK_SERVER_URL .mock-server.out > .mock-server.env
                cat .mock-server.env
        preconditions:
            - sh: test -x e2e/rust/target/release/mock-server
              msg: "alef mock-server binary not built. Run: task mock-server:rebuild"
        generates:
            - .mock-server.pid
            - .mock-server.env

    mock-server:stop:
        desc: Stop the e2e mock HTTP server
        cmds:
            - |
                if [ -f .mock-server.pid ]; then
                  kill "$(cat .mock-server.pid)" 2>/dev/null || true
                  rm -f .mock-server.pid .mock-server.env
                fi

    generate:all:
        desc: Generate all E2E tests from fixtures across all supported languages
        cmds:
            - task: rust:e2e:generate
            - task: python:e2e:generate
            - task: node:e2e:generate
            - task: go:e2e:generate
            - task: java:e2e:generate
            - task: csharp:e2e:generate
            - task: wasm:e2e:generate
            - task: ruby:e2e:generate
            - task: php:e2e:generate
            - task: c:e2e:generate
            - task: brew:e2e:generate

    test:all:
        desc: Run all E2E tests across all supported languages (builds bindings, starts mock server)
        deps: [mock-server:start]
        cmds:
            # Build bindings before testing.
            - task: :rust:build
            - task: :python:build:dev
            - task: :node:build:dev
            - task: :rust:ffi:build
            - task: :go:build
            - task: :java:build
            - task: :csharp:build
            - task: :ruby:build
            - task: :php:build
            - task: :elixir:build
            # Run e2e tests (source mock server URL, run all suites, fail at end if any failed).
            - cmd: |
                  eval "$(cat .mock-server.env 2>/dev/null)"
                  export MOCK_SERVER_URL
                  overall=0
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task rust:e2e:test    || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task python:e2e:test  || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task node:e2e:test    || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task go:e2e:test      || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task java:e2e:test    || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task csharp:e2e:test  || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task ruby:e2e:test    || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task php:e2e:test     || overall=$?
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task elixir:e2e:test  || overall=$?
                  if command -v pnpm >/dev/null 2>&1; then
                    MOCK_SERVER_URL="$MOCK_SERVER_URL" task wasm:e2e:test || overall=$?
                  else
                    echo "skip: wasm e2e (pnpm not found)"
                  fi
                  if command -v cc >/dev/null 2>&1 && command -v make >/dev/null 2>&1; then
                    MOCK_SERVER_URL="$MOCK_SERVER_URL" task c:e2e:test || overall=$?
                  else
                    echo "skip: c e2e (cc/make not found)"
                  fi
                  MOCK_SERVER_URL="$MOCK_SERVER_URL" task brew:e2e:test || overall=$?
                  exit $overall
            - defer: { task: mock-server:stop }

    test:quick:
        desc: Quick E2E test (Rust only — fastest feedback)
        deps: [mock-server:start]
        env:
            MOCK_SERVER_URL:
                sh: cat .mock-server.env 2>/dev/null | grep MOCK_SERVER_URL | cut -d= -f2
        cmds:
            - task: :rust:build
            - task: rust:e2e:test
            - defer: { task: mock-server:stop }

    verify:all:
        desc: Full E2E pipeline - generate, lint, and test all suites
        cmds:
            - task: e2e:generate:all
            - task: e2e:lint:all
            - task: e2e:test:all

    lint:all:
        desc: Lint all generated E2E test code
        cmds:
            - task: rust:e2e:lint
            - task: python:e2e:lint
            - task: node:e2e:lint
            - task: go:e2e:lint
            - task: java:e2e:lint
            - task: csharp:e2e:lint
            - task: wasm:e2e:lint
            - task: ruby:e2e:lint
            - task: php:e2e:lint
            - task: c:e2e:lint
            - task: brew:e2e:lint

    rust:generate:
        desc: Generate Rust E2E tests from fixtures
        cmds:
            - task: rust:e2e:generate

    rust:lint:
        desc: Lint Rust E2E code
        cmds:
            - task: rust:e2e:lint

    rust:test:
        desc: Run Rust E2E tests
        cmds:
            - task: rust:e2e:test

    rust:verify:
        desc: Full Rust E2E pipeline (generate + format + lint + test)
        cmds:
            - task: rust:e2e:generate
            - task: rust:e2e:format
            - task: rust:e2e:lint
            - task: rust:e2e:test

