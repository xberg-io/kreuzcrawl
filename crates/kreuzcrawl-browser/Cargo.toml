[package]
name = "kreuzcrawl-browser"
version = "0.1.0"
edition = "2021"
license = "Elastic-2.0"
publish = false

[features]
default = []
stealth = ["wreq", "wreq-util"]

[build-dependencies]
deno_core = "0.350"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
cssparser = "0.34"
deno_core = "0.350"
deno_error = "0.6"
futures = { workspace = true }
html5ever = "0.29"
markup5ever = "0.14"
precomputed-hash = { workspace = true }
reqwest = { workspace = true }
selectors = "0.26"
serde = { workspace = true }
serde_json = { workspace = true }
servo_arc = "0.4"
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
url = { workspace = true }
wreq-util = { version = "3.0.0-rc.10", optional = true }

[target.'cfg(any(target_os = "linux", target_os = "android"))'.dependencies]
wreq = { version = "6.0.0-rc.28", optional = true, features = ["prefix-symbols"] }

[target.'cfg(not(any(target_os = "linux", target_os = "android")))'.dependencies]
wreq = { version = "6.0.0-rc.28", optional = true }
