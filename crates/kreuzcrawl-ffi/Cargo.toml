[package]
name = "kreuzcrawl-ffi"
version = "0.3.0-rc.19"
edition = "2021"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
readme = false
keywords = ["crawl", "scrape", "web", "spider"]
categories = ["text-processing"]
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"

[package.metadata.cargo-machete]
# tokio is pulled in for its runtime/macros at link time but the generated
# FFI source never `use`s it directly — cargo-machete would otherwise flag it.
ignored = ["tokio"]

[lib]
crate-type = ["cdylib", "staticlib"]

[features]
default = []

[dependencies]
kreuzcrawl = { path = "../kreuzcrawl" }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
tempfile = "3"
