[package]
name = "kreuzcrawl-ffi"
version = "0.1.0-rc.1"
edition = "2021"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
kreuzcrawl = { path = "../kreuzcrawl" }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cbindgen = "0.28"
