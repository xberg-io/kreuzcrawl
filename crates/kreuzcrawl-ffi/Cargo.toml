[package]
name = "kreuzcrawl-ffi"
version = "0.3.0-rc.7"
edition = "2021"
license = "Elastic-2.0"
description = "High-performance web crawling engine"
repository = "https://github.com/kreuzberg-dev/kreuzcrawl"

[lib]
crate-type = ["cdylib", "staticlib"]

[features]
default = []

[dependencies]
kreuzcrawl = { path = "../kreuzcrawl" }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cbindgen = "0.29"

[lints.rust]
unsafe_code = "allow"
renamed_and_removed_lints = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
no_mangle_with_rust_abi = "allow"
duplicated_attributes = "allow"
let_and_return = "allow"
unwrap_used = "allow"
