[package]
name = "kreuzcrawl-php"
version = "0.1.0-rc.8"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
ext-php-rs = "0.15"
kreuzcrawl = { path = "../kreuzcrawl" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
