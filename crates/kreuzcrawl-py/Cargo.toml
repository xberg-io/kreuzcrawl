[package]
name = "kreuzcrawl-py"
version = "0.3.0-rc.7"
edition = "2024"
license = "Elastic-2.0"

[lib]
name = "_kreuzcrawl"
crate-type = ["cdylib"]

[dependencies]
kreuzcrawl = { path = "../kreuzcrawl" }
pyo3 = { version = "0.28", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints.clippy]
duplicated_attributes = "allow"
unwrap_used = "allow"
