[project]
site_name = "Kreuzcrawl"
site_description = "Kreuzcrawl – High-performance Rust web crawling engine with always-on HTML→Markdown, LLM extraction, browser automation, and bindings for 14 languages."
site_url = "https://docs.kreuzcrawl.kreuzberg.dev"
site_author = "kreuzberg.dev"
repo_name = "kreuzberg-dev/kreuzcrawl"
repo_url = "https://github.com/kreuzberg-dev/kreuzcrawl"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2023-2026 Kreuzberg, inc."
extra_css = ["css/extra.css"]

nav = [
  { "Home" = "index.md" },

  { "Get Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
  ] },

  { "Guides" = [
    { "Core" = [
      { "Crawling" = "guides/crawling.md" },
      { "Scraping" = "guides/scraping.md" },
      { "URL Discovery" = "guides/url-discovery.md" },
      { "Markdown Conversion" = "guides/markdown.md" },
      { "Configuration" = "guides/configuration.md" },
    ] },
    { "Advanced" = [
      { "Browser Automation" = "guides/browser.md" },
      { "WARC Output" = "guides/warc.md" },
    ] },
    { "Deployment" = [
      { "Docker" = "guides/docker.md" },
      { "API Server" = "guides/api-server.md" },
      { "MCP Server" = "guides/mcp-server.md" },
    ] },
    { "CLI" = "cli/usage.md" },
  ] },

  { "Concepts" = [
    { "Architecture" = "concepts/architecture.md" },
    { "Content Extraction" = "concepts/content-extraction.md" },
  ] },

  { "Reference" = [
    { "API" = [
      { "Rust" = "reference/api-rust.md" },
      { "Python" = "reference/api-python.md" },
      { "TypeScript / Node.js" = "reference/api-typescript.md" },
      { "Go" = "reference/api-go.md" },
      { "Java" = "reference/api-java.md" },
      { "Kotlin (Android)" = "reference/api-kotlin-android.md" },
      { "C#" = "reference/api-csharp.md" },
      { "Ruby" = "reference/api-ruby.md" },
      { "PHP" = "reference/api-php.md" },
      { "Elixir" = "reference/api-elixir.md" },
      { "Dart" = "reference/api-dart.md" },
      { "Swift" = "reference/api-swift.md" },
      { "Zig" = "reference/api-zig.md" },
      { "WebAssembly" = "reference/api-wasm.md" },
      { "C / FFI" = "reference/api-c.md" },
    ] },
    { "REST API" = "reference/rest-api.md" },
    { "MCP Tools" = "reference/mcp-tools.md" },
    { "Configuration" = "reference/configuration.md" },
    { "Types" = "reference/types.md" },
    { "Errors" = "reference/errors.md" },
  ] },

  { "More" = [
    { "Features" = "features.md" },
    { "Contributing" = "contributing.md" },
    { "Changelog" = "CHANGELOG.md" },
  ] },
]

[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "assets/logo.svg"
favicon = "assets/favicon.ico"
language = "en"
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.prune",
  "navigation.indexes",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
  "toc.integrate",
  "announce.dismiss",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "github"
search = "search"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "moon"
toggle.name = "Switch to dark mode"

# --- Markdown Extensions ---

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 3

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["docs/overrides/.icons"]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
linenums = false
use_pygments = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["docs", "."]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
case = "lower"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# --- Extra ---

[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[project.extra.repo]
stars = true
forks = true

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/kreuzberg-dev/kreuzcrawl"
name = "View on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/kreuzcrawl/"
name = "View on PyPI"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://github.com/kreuzberg-dev/kreuzcrawl/pkgs/container/kreuzcrawl"
name = "View on GitHub Container Registry"

[[project.extra.social]]
icon = "fontawesome/brands/npm"
link = "https://www.npmjs.com/package/@kreuzberg/kreuzcrawl"
name = "View on npm"

[[project.extra.social]]
icon = "fontawesome/brands/rust"
link = "https://crates.io/crates/kreuzcrawl"
name = "View on crates.io"
